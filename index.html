<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommandBar Analytics Dashboard v2.6.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F3F3F3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#181818;padding:20px 16px}
.wrap{max-width:980px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:4px;background:#032D60;display:flex;align-items:center;justify-content:center}
.title{font-size:18px;font-weight:700;color:#032D60;letter-spacing:-.2px}
.subtitle{font-size:12px;color:#706E6B}
.import-btn{padding:7px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;background:#0176D3;color:#fff;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;border:none;transition:background .15s}
.import-btn:hover{background:#014486}
.import-msg{margin:8px 0 4px;padding:8px 14px;border-radius:4px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.import-msg.success{background:#2E844A14;color:#2E844A}
.import-msg.error{background:#BA051714;color:#BA0517}
.import-msg .close{cursor:pointer;opacity:.6;font-size:16px}
.tabs{display:flex;gap:0;margin:16px 0 0;border-bottom:2px solid #E5E5E5}
.tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#706E6B;letter-spacing:.1px;transition:all .15s;border-bottom:3px solid transparent;margin-bottom:-2px;position:relative}
.tab:hover{color:#032D60}
.tab.active{color:#0176D3;border-bottom-color:#0176D3}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;margin-top:16px}
.card{flex:1 1 160px;padding:16px 18px;border-radius:4px;background:#fff;border:1px solid #E5E5E5;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.card-label{font-size:10px;font-weight:700;color:#706E6B;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.card-value{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card-sub{font-size:11px;color:#706E6B;margin-top:3px}
.charts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.chart-card{padding:16px 18px;border-radius:4px;background:#fff;border:1px solid #E5E5E5;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.chart-title{font-size:13px;font-weight:700;color:#032D60;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;overflow:hidden}
.insights{padding:16px 20px;border-radius:4px;background:#032D60;color:#fff;margin-bottom:16px}
.insights h3{font-size:13px;font-weight:700;margin-bottom:8px}
.insights div{font-size:12px;line-height:1.7;opacity:.88}
.insights strong{color:#1B96FF}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-strong{background:#0176D314;color:#0176D3}
.badge-mixed{background:#DD7A0114;color:#DD7A01}
.badge-weak{background:#BA051714;color:#BA0517}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.top5-item{padding:5px 0}
.top5-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.top5-title{font-size:11px;color:#181818;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.top5-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.top5-count{font-size:11px;font-weight:700;color:#032D60}
.top5-bar{height:6px;background:#F3F3F3;border-radius:3px;overflow:hidden}
.top5-fill{height:100%;border-radius:3px;transition:width .4s ease}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid #E5E5E5}
th{padding:10px 8px;font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none;transition:color .15s;color:#706E6B}
th:first-child{text-align:left}
th:hover{color:#032D60}
td{padding:8px 8px;text-align:center}
td:first-child{text-align:left;font-weight:500;max-width:300px}
td:first-child div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{border-bottom:1px solid #F3F3F3}
tbody tr:hover{background:#F3F3F3}
.type-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block}
.detail-item{padding:8px 0;border-bottom:1px solid #F3F3F3}
.detail-item:last-child{border-bottom:none}
.detail-row{display:flex;justify-content:space-between;align-items:center}
.detail-left{display:flex;align-items:center;gap:8px}
.detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-label{font-size:12px;font-weight:600;color:#181818}
.detail-count{font-size:14px;font-weight:700}
.detail-sub{margin-left:16px;margin-top:4px;font-size:11px;color:#706E6B}
.footer{text-align:center;font-size:10px;color:#706E6B;padding:16px 0 12px;margin-top:8px}
.hidden{display:none}
/* ── Feed sidebar ── */
.feed-sidebar{width:160px;flex-shrink:0;border-right:1px solid #E5E5E5;display:flex;flex-direction:column;transition:width .2s ease,opacity .2s ease}
.feed-sidebar.collapsed{width:0;overflow:hidden;border-right:none;opacity:0;pointer-events:none}
.feed-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 6px;border-bottom:1px solid #E5E5E5;flex-shrink:0}
.feed-sidebar-label{font-size:9px;font-weight:700;color:#706E6B;letter-spacing:.7px;text-transform:uppercase}
.feed-sidebar-search{padding:6px 10px;border-bottom:1px solid #E5E5E5;flex-shrink:0}
.feed-sidebar-search input{width:100%;padding:4px 7px;border-radius:4px;border:1px solid #E5E5E5;font-size:11px;font-family:inherit;color:#181818;outline:none}
.feed-sidebar-search input:focus{border-color:#0176D3;box-shadow:0 0 0 1px #0176D3}
.feed-sidebar-list{flex:1}
.feed-sidebar-item{display:flex;align-items:center;padding:7px 12px;cursor:pointer;border-bottom:1px solid #F3F3F3;transition:background .12s;border-left:3px solid transparent;white-space:nowrap}
.feed-sidebar-item:hover{background:#F3F3F3}
.feed-sidebar-item.active{background:#0176D30A;border-left-color:#0176D3}
.feed-sidebar-item.active .fsn{color:#0176D3;font-weight:700}
.fsn{font-size:11px;font-weight:500;color:#181818;overflow:hidden;text-overflow:ellipsis}
.feed-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;border:1px solid #E5E5E5;background:#fff;font-size:11px;font-weight:600;color:#706E6B;cursor:pointer;transition:all .15s;flex-shrink:0}
.feed-toggle-btn:hover{border-color:#0176D3;color:#0176D3}
.feed-toggle-btn.open{border-color:#0176D3;color:#0176D3;background:#0176D30A}
.date-quick{padding:4px 10px;border-radius:4px;border:1px solid #E5E5E5;background:#fff;font-size:11px;font-weight:600;color:#706E6B;cursor:pointer;font-family:inherit;transition:all .15s}
.date-quick:hover{border-color:#0176D3;color:#0176D3;background:#0176D30A}
.date-quick.active{border-color:#0176D3;color:#0176D3;background:#0176D30D}
</style>
</head>
<body>
<!-- Auth Gate -->
<div id="auth-gate" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#F3F3F3;z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:4px;border:1px solid #E5E5E5;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:40px;max-width:360px;width:90%;text-align:center">
    <div style="width:48px;height:48px;border-radius:4px;background:#032D60;display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
    <div style="font-size:18px;font-weight:700;color:#032D60;margin-bottom:4px">CommandBar Analytics</div>
    <div style="font-size:12px;color:#706E6B;margin-bottom:20px">SouthState Correspondent</div>
    <input type="password" id="auth-input" placeholder="Enter access code" style="width:100%;padding:10px 14px;border-radius:4px;border:1px solid #E5E5E5;font-size:14px;font-family:inherit;color:#181818;outline:none;text-align:center;margin-bottom:12px" onkeydown="if(event.key==='Enter')checkAuth()">
    <button onclick="checkAuth()" style="width:100%;padding:10px;border-radius:4px;border:none;background:#0176D3;color:#fff;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.2px;transition:background .15s" onmouseover="this.style.background='#014486'" onmouseout="this.style.background='#0176D3'">Access Dashboard</button>
    <div id="auth-error" style="margin-top:10px;font-size:12px;color:#BA0517;display:none">Invalid access code</div>
  </div>
</div>
<div class="wrap" id="app" style="display:none">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      <div style="position:relative;display:inline-block"><div class="title">CommandBar Analytics<span style="margin-left:10px;font-size:11px;font-weight:300;letter-spacing:.5px;color:rgba(255,255,255,0.35);vertical-align:middle">v2.6.0</span></div><div class="subtitle" id="period-label"></div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:4px;align-items:center">
        <button class="date-quick" onclick="setQuickDate('today')">Today</button>
        <button class="date-quick" onclick="setQuickDate('yesterday')">Yesterday</button>
        <button class="date-quick" onclick="setQuickDate('7d')">7D</button>
        <button class="date-quick" onclick="setQuickDate('month')">Month</button>
        <button class="date-quick" onclick="setQuickDate('quarter')">Quarter</button>
        <button class="date-quick" onclick="setQuickDate('year')">Year</button>
      </div>
      <input type="date" id="date-from" min="2026-03-29" style="padding:6px 10px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;color:#181818">
      <span style="font-size:11px;color:#706E6B">to</span>
      <input type="date" id="date-to" style="padding:6px 10px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;color:#181818">
      <button class="import-btn" id="fetch-btn" onclick="fetchAPI()" style="background:#0176D3">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Load Data
      </button>
      <input type="file" id="csv-input" accept=".csv,.tsv,.txt" style="display:none">
      <button class="import-btn" id="csv-btn" onclick="document.getElementById('csv-input').click()" style="background:#706E6B;display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV
      </button>
    </div>
  </div>
  <div id="import-msg"></div>
  <!-- Tabs -->
  <div id="tabs-bar" class="tabs">
    <button class="tab active" data-tab="contacts">Contacts</button>
    <button class="tab" data-tab="companies">Companies</button>
    <button class="tab" data-tab="map">Firmographic Map</button>
    <button class="tab" data-tab="art">ACQ Risk Tool</button>
  </div>
  <!-- Tab Panels -->
  <div id="tab-contacts" style="margin-top:20px"></div>
  <div id="tab-companies" class="hidden" style="margin-top:20px"></div>
  <div id="tab-map" class="hidden" style="margin-top:20px"></div>
  <div id="tab-art" class="hidden" style="margin-top:20px"></div>
  <div class="footer" id="footer">CommandBar Analytics Dashboard v2.6.0 · Powered by SiteImprove Events + Leadfeeder · SouthState Correspondent</div>
</div>
<script>
// ── AUTH GATE ──
var AUTH_KEY = 'sscd2026';
var authPassed = false;
(function(){
  var params = new URLSearchParams(window.location.search);
  if (params.get('key') === AUTH_KEY) {
    authPassed = true;
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = '';
  } else {
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setTimeout(function(){ var inp = document.getElementById('auth-input'); if(inp) inp.focus(); }, 100);
  }
})();
function checkAuth(){
  var inp = document.getElementById('auth-input');
  if (inp && inp.value === AUTH_KEY) {
    authPassed = true;
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = '';
    // Trigger initial fetch since it was blocked
    setTimeout(fetchAPI, 300);
    fetchLfFeeds();
  } else {
    var err = document.getElementById('auth-error');
    if (err) err.style.display = 'block';
    if (inp) { inp.value = ''; inp.focus(); }
  }
}
// ── DATA ──
let RAW_DATA = [];
let RAW_DATA_ALL = [];
let PERIOD = "";
let hasData = false;
let currentTab = "contacts";



let charts = {};
const CL = {navy:"#032D60",blue:"#0176D3",gold:"#DD7A01",red:"#BA0517",grey:"#706E6B",green:"#2E844A"};
function trunc(s,n=40){return s.length>n?s.slice(0,n-1)+"\u2026":s}
function badge(pct){const cls=pct>=50?"strong":pct>0?"mixed":"weak";const color=pct>=50?CL.blue:pct>0?CL.gold:CL.red;return `<span class="badge badge-${cls}"><span class="badge-dot" style="background:${color}"></span>${cls.charAt(0).toUpperCase()+cls.slice(1)}</span>`;}
function card(label,value,sub,accent){accent=accent||CL.navy;return `<div class="card"><div class="card-label">${label}</div><div class="card-value" style="color:${accent}">${value}</div>${sub?`<div class="card-sub">${sub}</div>`:""}</div>`;}
// ── LEADFEEDER FEED STATE ──
var LF_URL = "https://leadfeeder-proxy.jameswspence.workers.dev";
var LF_FEEDS_STATIC = [
  {id:"adc3fd58-9efb-11ec-a2e4-35bdf72110d7", name:"ICP"},
  {id:"66d325bc-7306-11f0-9c64-5db4939f49ea", name:"Banking and Finance"},
  {id:"d92ac4f6-9f08-11ec-b201-5dbc05743d4b", name:"ARC"},
  {id:"715aff44-9f26-11ec-9d86-7515457aa63b", name:"Loan Command"},
  {id:"3409ff36-15ce-11ed-ade3-47b1039f35fa", name:"ON FIRE"},
];
var lfFeeds = LF_FEEDS_STATIC.slice();
var currentLfFeed = null;
var lfFeedsLoaded = false;
async function fetchLfFeeds(){
  if(lfFeedsLoaded)return;
  try{var resp=await fetch(LF_URL+"/feeds",{cache:'no-store'});var result=await resp.json();if(result.data&&result.data.length>0){lfFeeds=result.data.map(function(f){return{id:f.id,name:f.name||f.id,lead_count:f.lead_count};});}lfFeedsLoaded=true;}catch(e){lfFeedsLoaded=true;}
  renderFeedSidebars();
}
var feedSidebarOpen = true;
var openFolders={};
function feedSidebarHTML(domId){
if(!feedSidebarOpen){
  // Collapsed: thin clickable strip to re-expand
  return '<div id="'+domId+'" style="width:20px;flex-shrink:0;border-right:1px solid #E5E5E5;display:flex;align-items:flex-start;justify-content:center;cursor:pointer;background:#F9F9F9" onclick="toggleFeedSidebar()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#706E6B" stroke-width="2.5" style="margin-top:12px"><polyline points="9 18 15 12 9 6"/></svg></div>';
}
var html='<div class="feed-sidebar" id="'+domId+'">';
// Header with collapse arrow
html+='<div class="feed-sidebar-header" style="cursor:pointer" onclick="toggleFeedSidebar()"><span class="feed-sidebar-label">Feeds</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#706E6B" stroke-width="2.5" style="flex-shrink:0"><polyline points="15 18 9 12 15 6"/></svg></div>';
// Search
html+='<div class="feed-sidebar-search"><input type="text" placeholder="Search all..." oninput="filterFeedSidebar(this.value,\''+domId+'\')" id="'+domId+'-search"></div>';
// All Feeds item
html+='<div class="feed-sidebar-item'+(currentLfFeed===null?' active':'')+'" onclick="setLfFeed(null)" style="padding:5px 12px"><span class="fsn" style="font-size:10px">All Feeds</span></div>';
// Folders inline
Object.keys(FEED_FOLDERS).forEach(function(folder){
  var isOpen=openFolders[folder]||false;
  var folderActive=FEED_FOLDERS[folder].indexOf(currentLfFeed)>-1;
  html+='<div style="border-top:1px solid #F3F3F3">';
  html+='<div onclick="toggleFolder(\''+folder+'\')" style="display:flex;align-items:center;gap:5px;padding:5px 10px;cursor:pointer;background:'+(folderActive?'#0176D308':'transparent')+'">';
  html+='<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#706E6B" stroke-width="3"><polyline points="'+(isOpen?'6 9 12 15 18 9':'9 6 15 12 9 18')+'"/></svg>';
  html+='<svg width="12" height="12" viewBox="0 0 24 24" fill="'+(folderActive?'#0176D3':'#706E6B')+'" stroke="none"><path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>';
  html+='<span style="font-size:10px;font-weight:600;color:'+(folderActive?'#0176D3':'#444')+'">'+folder+'</span></div>';
  if(isOpen){
    FEED_FOLDERS[folder].forEach(function(fid){
      var feed=lfFeeds.find(function(f){return f.id===fid;});
      var name=feed?feed.name:fid;
      var isActive=currentLfFeed===fid;
      html+='<div class="feed-sidebar-item'+(isActive?' active':'')+'" onclick="setLfFeed(\''+fid+'\')" style="padding:4px 12px 4px 30px"><span class="fsn" style="font-size:10px">'+name+'</span></div>';
    });
  }
  html+='</div>';
});
// Full feed list
html+='<div class="feed-sidebar-list" id="'+domId+'-list">'+feedSidebarItems()+'</div>';
// Dealfront link
html+='<div style="padding:8px 10px;border-top:1px solid #E5E5E5;text-align:center"><a href="https://app.dealfront.com/f/sign/in" target="_blank" rel="noopener" style="font-size:10px;color:#0176D3;text-decoration:none;font-weight:600">Manage Feeds in Leadfeeder \u2197</a></div>';
html+='</div>';return html;}
function feedSidebarItems(filter){filter=(filter||'').toLowerCase();var items='';lfFeeds.filter(function(f){return !filter||f.name.toLowerCase().indexOf(filter)>-1}).forEach(function(f){var isActive=(currentLfFeed===f.id);items+='<div class="feed-sidebar-item'+(isActive?' active':'')+'" onclick="setLfFeed(\''+f.id+'\')"><span class="fsn">'+f.name+'</span></div>';});return items;}
function filterFeedSidebar(val,domId){var list=document.getElementById(domId+'-list');if(list)list.innerHTML=feedSidebarItems(val);}
function toggleFeedSidebar(){feedSidebarOpen=!feedSidebarOpen;renderFeedSidebars();}
function toggleFolder(folder){openFolders[folder]=!openFolders[folder];renderFeedSidebars();}
function renderFeedSidebars(){['co-feed-sidebar','map-feed-sidebar'].forEach(function(id){var el=document.getElementById(id);if(!el)return;var searchEl=document.getElementById(id+'-search');var searchVal=searchEl?searchEl.value:'';el.outerHTML=feedSidebarHTML(id);var newSearch=document.getElementById(id+'-search');if(newSearch&&searchVal)newSearch.value=searchVal;});}
function setLfFeed(feedId){currentLfFeed=feedId||null;companiesData=null;mapStateData=null;companyPagesCache={};renderFeedSidebars();if(currentTab==='companies')fetchCompanies();else if(currentTab==='map')fetchMapData();else fetchCompanies();}

// ── FEED FOLDERS ──
var FEED_FOLDERS={
  "ARC Team":["5c3e9166-1cc1-11ed-a45f-25aa8376bb70","ad34e41c-1cc1-11ed-8bcc-136c81f9d916","0139350e-1cc2-11ed-a51f-455835f9ada6","8c1a764c-1cc2-11ed-8bcc-136c81f9d916","233b8890-1cc3-11ed-a51f-455835f9ada6","a5e714f8-1cc3-11ed-a45f-25aa8376bb70","f52325b6-1cc3-11ed-8bcc-136c81f9d916","c3d01684-b455-11ed-8a28-2f8fd8bf6bdb","a56c16be-136c-11ed-b07d-2d11ead9a6f6"],

const WORKER_URL = "https://siteimprove-proxy.jameswspence.workers.dev";
async function fetchSiteImproveRange(fromStr, toStr, category, statusCb) {
  var catParam = category ? "&category=" + encodeURIComponent(category) : "";
  var days = splitIntoDays(fromStr, toStr);

  // Fetch a single day with automatic pagination (handles >1000 rows per day)
  async function fetchDay(dayStr) {
    var allRows = [];
    var page = 1;
    while (true) {
      var url = WORKER_URL + "?period=" + dayStr + "&page_size=1000&page=" + page + catParam;
      var resp = await fetch(url, { cache: 'no-store' });
      var result = await resp.json();
      if (result.error) throw new Error(result.error + (result.detail ? " \u2014 " + result.detail : ""));
      var rows = result.data || [];
      allRows = allRows.concat(rows);
      // Use raw_count (unfiltered API row count) to decide pagination,
      // not filtered rows.length which may be smaller due to client-side category filtering
      var apiRowCount = result.raw_count || rows.length;
      if (apiRowCount < 1000) break; // last page
      page++;
      if (page > 10) break; // safety cap at 10k rows per day
    }
    return allRows;
  }

  if (days.length === 1) {
    if (statusCb) statusCb(randomLoadingMsg());
    return await fetchDay(days[0]);
  }

  if (statusCb) statusCb(randomLoadingMsg());
  var allChunkResults = [];
  var batchSize = 7;
  for (var b = 0; b < days.length; b += batchSize) {
    var batch = days.slice(b, b + batchSize);
    if (statusCb) statusCb(randomLoadingMsg() + " (" + (b + 1) + "-" + Math.min(b + batchSize, days.length) + " of " + days.length + " days)");
    var batchFetches = batch.map(function(day) {
      return fetchDay(day).catch(function() { return []; });
    });
    var batchResults = await Promise.all(batchFetches);
    allChunkResults = allChunkResults.concat(batchResults);
  }
  var data = mergeEventRows(allChunkResults);
  return data;
}
function splitIntoDays(fromStr, toStr) {
  var days = [];
  var cur = new Date(fromStr.slice(0,4)+'-'+fromStr.slice(4,6)+'-'+fromStr.slice(6,8)+'T12:00:00');
  var end = new Date(toStr.slice(0,4)+'-'+toStr.slice(4,6)+'-'+toStr.slice(6,8)+'T12:00:00');
  var fmt = function(d){ return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); };
  while(cur <= end) {
    days.push(fmt(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}
function mergeEventRows(allArrays) {
  var merged = {};
  allArrays.forEach(function(arr) { (arr || []).forEach(function(row) { var key = (row.category||'') + '|' + (row.action||'') + '|' + (row.label||''); if(!merged[key]) merged[key] = {category:row.category, action:row.action, label:row.label, events:0, visits:0}; merged[key].events += (row.events||0); merged[key].visits += (row.visits||0); }); });
  return Object.values(merged);
}

    var sfcMatch=row.label.match(/sfc:([A-Za-z0-9]{18}|[A-Za-z0-9]{15})(?![A-Za-z0-9])/);

    }

    var didMatch=row.label.match(/\|\s*did:([a-f0-9-]+)/i);var did=didMatch?didMatch[1]:null;
    var labelClean=row.label.replace(/\s*\|\s*sfc:[A-Za-z0-9]+/,"").replace(/\s*\|\s*anon:[a-f0-9]+/i,"").replace(/\s*\|\s*ts:\d+/,"").replace(/\s*\|\s*did:[a-f0-9-]+/i,"").trim();

html+='<div class="chart-card" style="margin-bottom:16px;padding:12px 16px"><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end"><div style="flex:1;min-width:180px"><div style="font-size:10px;font-weight:700;color:#706E6B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Search Bank</div><input type="text" id="art-search" placeholder="Bank name..." value="'+artSearch+'" oninput="artSetSearch(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;outline:none"></div><div style="min-width:100px"><div style="font-size:10px;font-weight:700;color:#706E6B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">State</div><select id="art-state" onchange="artSetState(this.value)" style="width:100%;padding:6px 8px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;outline:none"><option value="">All</option>';allStates.forEach(function(st){html+='<option value="'+st+'"'+(artStateFilter===st?' selected':'')+'>'+st+'</option>';});html+='</select></div><div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#706E6B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Min</div><input type="number" id="art-score-min" min="0" max="100" value="'+artScoreMin+'" oninput="artSetScoreMin(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;outline:none"></div><div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#706E6B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Max</div><input type="number" id="art-score-max" min="0" max="100" value="'+artScoreMax+'" oninput="artSetScoreMax(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E5E5E5;font-size:12px;font-family:inherit;outline:none"></div><div><button onclick="artResetFilters()" style="padding:6px 14px;border-radius:8px;border:1px solid #E5E5E5;background:#fff;font-size:11px;font-weight:600;color:#706E6B;cursor:pointer">Reset</button></div></div></div>';

el.innerHTML=html;}
function renderARTList(allRows,riskColor,scoreColor){if(!riskColor)riskColor=function(risk){if(!risk)return'#706E6B';var r=risk.toLowerCase();if(r.indexOf('high')>-1)return CL.red;if(r.indexOf('moderate')>-1)return CL.gold;if(r.indexOf('low')>-1)return CL.green;return'#706E6B';};if(!scoreColor)scoreColor=function(score){if(score===null)return'#706E6B';if(score>=70)return CL.red;if(score>=40)return CL.gold;return CL.green;};var filtered=allRows.filter(function(r){if(artSearch&&r.bankName.toLowerCase().indexOf(artSearch.toLowerCase())===-1)return false;if(artStateFilter&&r.state!==artStateFilter)return false;if(r.score!==null){if(r.score<artScoreMin||r.score>artScoreMax)return false;}return true;});filtered.sort(function(a,b){if(artSortField==='bankName')return artSortDir==='asc'?a.bankName.localeCompare(b.bankName):b.bankName.localeCompare(a.bankName);if(artSortField==='state')return artSortDir==='asc'?(a.state||'').localeCompare(b.state||''):(b.state||'').localeCompare(a.state||'');if(artSortField==='score')return artSortDir==='asc'?(a.score||0)-(b.score||0):(b.score||0)-(a.score||0);if(artSortField==='events')return artSortDir==='asc'?a.events-b.events:b.events-a.events;return 0;});if(filtered.length===0){return'<div style="text-align:center;padding:32px;color:#706E6B;font-size:12px">No banks match the current filters.</div>';}
var html='<div style="font-size:11px;color:#706E6B;margin-bottom:8px">'+filtered.length+' bank'+(filtered.length!==1?'s':'')+' shown</div><div class="chart-card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:2px solid #E5E5E5">';[{l:'Bank',f:'bankName',a:'left'},{l:'State',f:'state',a:'center'},{l:'Score',f:'score',a:'center'},{l:'Risk',f:'risk',a:'center'},{l:'Views',f:'events',a:'center'}].forEach(function(col){var active=artSortField===col.f;var arrow=active?(artSortDir==='desc'?' \u25BC':' \u25B2'):'';html+='<th onclick="artSort(\''+col.f+'\')" style="text-align:'+col.a+';padding:10px 12px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:'+(active?'#032D60':'#706E6B')+'">'+col.l+arrow+'</th>';});html+='</tr></thead><tbody>';
filtered.forEach(function(row,i){var sc=scoreColor(row.score);var rc=riskColor(row.risk);html+='<tr style="border-bottom:1px solid #F3F3F3;'+(i%2===1?'background:#F9F9F9;':'')+'">';html+='<td style="padding:9px 12px"><div style="font-weight:600;color:#181818">'+row.bankName+'</div>';if(row.cert)html+='<div style="font-size:10px;color:#706E6B">CERT #'+row.cert+'</div>';html+='</td>';html+='<td style="text-align:center;padding:9px 12px"><span style="font-size:12px;font-weight:700;color:#032D60">'+(row.state||'\u2013')+'</span></td>';html+='<td style="text-align:center;padding:9px 12px">';if(row.score!==null){html+='<div style="display:flex;align-items:center;gap:6px;justify-content:center"><div style="width:48px;height:5px;background:#F3F3F3;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+row.score+'%;background:'+sc+';border-radius:3px"></div></div><span style="font-size:13px;font-weight:700;color:'+sc+'">'+row.score+'</span></div>';}else{html+='<span style="color:#D0D5DD">\u2013</span>';}html+='</td>';html+='<td style="text-align:center;padding:9px 12px">';if(row.risk){html+='<span style="font-size:10px;font-weight:600;color:'+rc+';background:'+rc+'14;border-radius:6px;padding:2px 8px">'+row.risk+'</span>';}else{html+='<span style="color:#D0D5DD">\u2013</span>';}html+='</td>';html+='<td style="text-align:center;padding:9px 12px;font-weight:700;color:#032D60">'+row.events+'</td></tr>';});html+='</tbody></table></div>';return html;}
function artSort(field){if(artSortField===field)artSortDir=artSortDir==='desc'?'asc':'desc';else{artSortField=field;artSortDir=field==='bankName'||field==='state'?'asc':'desc';}artRefreshList();}
function artSetSearch(val){artSearch=val;artRefreshList();}function artSetState(val){artStateFilter=val;artRefreshList();}function artSetScoreMin(val){artScoreMin=parseInt(val,10)||0;artRefreshList();}function artSetScoreMax(val){artScoreMax=parseInt(val,10)||100;artRefreshList();}function artResetFilters(){artSearch='';artStateFilter='';artScoreMin=0;artScoreMax=100;renderARTContent();}
function artRefreshList(){var list=document.getElementById('art-list');if(!list||!artData)return;var byLabel={};artData.forEach(function(r){var lbl=r.label||'';var parsed=parseARTLabel(lbl);var key=parsed.cert?parsed.cert:parsed.bankName.toLowerCase();if(!byLabel[key])byLabel[key]=Object.assign(parsed,{events:0,actions:{}});byLabel[key].events+=(r.events||0);});list.innerHTML=renderARTList(Object.values(byLabel));}

async function exportPDF(){var btn=document.getElementById("export-btn");if(!btn)return;var origText=btn.innerHTML;btn.innerHTML="Generating...";btn.style.opacity=".6";btn.style.pointerEvents="none";try{const{jsPDF}=window.jspdf;const pdf=new jsPDF("l","mm","a4");const pw=pdf.internal.pageSize.getWidth();const ph=pdf.internal.pageSize.getHeight();const margin=12;const contentW=pw-margin*2;const headerH=27;const footerH=8;const availH=ph-headerH-footerH;let pageCount=0;function drawHeader(title,contd){pdf.setFillColor(0,45,114);pdf.rect(0,0,pw,18,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(14);pdf.setTextColor(255,255,255);pdf.text("CommandBar Analytics v2.6.0",margin,12);pdf.setFont("helvetica","normal");pdf.setFontSize(9);pdf.text((PERIOD?PERIOD+" \u00b7 ":"")+"SouthState Correspondent",pw-margin,12,{align:"right"});pdf.setFillColor(9,96,187);pdf.rect(0,18,pw,6,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(8);pdf.setTextColor(255,255,255);pdf.text(title.toUpperCase()+(contd?" (CONTINUED)":""),margin,22.5);pdf.setTextColor(0,0,0);}function drawFooter(n){pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(138,144,153);pdf.text("CommandBar Analytics Dashboard v2.6.0 \u00b7 SiteImprove Events",margin,ph-5);pdf.text("Page "+n,pw-margin,ph-5,{align:"right"});}function addPage(title,contd){if(pageCount>0)pdf.addPage();pageCount++;drawHeader(title,contd||false);drawFooter(pageCount);}async function captureAndAdd(el,tabName){const canvas=await html2canvas(el,{scale:2,backgroundColor:"#F5F7FA",useCORS:true,logging:false,windowWidth:980});const imgData=canvas.toDataURL("image/jpeg",0.92);const imgW=contentW;const imgH=(canvas.height/canvas.width)*contentW;const finalH=Math.min(imgH,availH);const finalW=imgH>availH?(availH/imgH)*imgW:imgW;const xOff=margin+(contentW-finalW)/2;addPage(tabName);pdf.addImage(imgData,"JPEG",xOff,headerH,finalW,finalH);}const tabs=["content","insights","engagement","historical","leaderboard","companies","map","art"];const tabNames=["Content","Performance","Activity","Compare","Trending","Companies","Map","ACQ Risk Tool"];const savedTab=currentTab;for(let i=0;i<tabs.length;i++){tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display=t===tabs[i]?"block":"none";el.classList.remove("hidden");});await new Promise(r=>setTimeout(r,600));if(tabs[i]==="content"){await captureAndAdd(document.getElementById("content-charts"),"Content");}else{await captureAndAdd(document.getElementById("tab-"+tabs[i]),tabNames[i]);}}tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==savedTab);});pdf.save("CommandBar-Analytics"+(PERIOD?"-"+PERIOD.replace(/[^a-zA-Z0-9]+/g,"-"):"")+".pdf");}catch(err){console.error("PDF export error:",err);document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>PDF export failed: '+err.message+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';["contacts","content","insights","engagement","historical","leaderboard","companies","map","art"].forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==currentTab);});}btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";}
