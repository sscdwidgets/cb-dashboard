<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommandBar Analytics Dashboard v2.6.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;color:#1A1A2E;padding:20px 16px}
.wrap{max-width:980px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:8px;background:#002D72;display:flex;align-items:center;justify-content:center}
.title{font-size:19px;font-weight:700;color:#002D72;letter-spacing:-.3px}
.subtitle{font-size:12px;color:#8A9099}
.import-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#002D72;color:#fff;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;border:none}
.import-btn:hover{opacity:.85}
.import-msg{margin:8px 0 4px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.import-msg.success{background:#2E7D3214;color:#2E7D32}
.import-msg.error{background:#E5393514;color:#E53935}
.import-msg .close{cursor:pointer;opacity:.6;font-size:16px}
.tabs{display:flex;gap:6px;margin:16px 0 18px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E8ECF0;background:#fff;color:#8A9099;letter-spacing:.2px;transition:all .15s}
.tab.active{border-color:#0960BB;background:#0960BB0D;color:#0960BB}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{flex:1 1 160px;padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.card-label{font-size:10px;font-weight:700;color:#8A9099;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.card-value{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card-sub{font-size:11px;color:#8A9099;margin-top:3px}
.charts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.chart-card{padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.chart-title{font-size:12px;font-weight:700;color:#002D72;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;overflow:hidden}
.insights{padding:16px 20px;border-radius:12px;background:#002D72;color:#fff;margin-bottom:16px}
.insights h3{font-size:13px;font-weight:700;margin-bottom:8px}
.insights div{font-size:12px;line-height:1.7;opacity:.88}
.insights strong{color:#FFBF3F}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-strong{background:#0960BB14;color:#0960BB}
.badge-mixed{background:#FFBF3F14;color:#FFBF3F}
.badge-weak{background:#E5393514;color:#E53935}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.top5-item{padding:5px 0}
.top5-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.top5-title{font-size:11px;color:#1A1A2E;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.top5-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.top5-count{font-size:11px;font-weight:700;color:#002D72}
.top5-bar{height:6px;background:#F5F7FA;border-radius:3px;overflow:hidden}
.top5-fill{height:100%;border-radius:3px;transition:width .4s ease}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:2px solid #E8ECF0}
th{padding:10px 8px;font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none;transition:color .15s}
th:first-child{text-align:left}
th:hover{color:#002D72}
td{padding:8px 8px;text-align:center}
td:first-child{text-align:left;font-weight:500;max-width:300px}
td:first-child div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{border-bottom:1px solid #F0F2F5}
tbody tr:nth-child(even){background:#FAFBFC}
.type-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block}
.detail-item{padding:8px 0;border-bottom:1px solid #F0F2F5}
.detail-item:last-child{border-bottom:none}
.detail-row{display:flex;justify-content:space-between;align-items:center}
.detail-left{display:flex;align-items:center;gap:8px}
.detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-label{font-size:12px;font-weight:600;color:#1A1A2E}
.detail-count{font-size:14px;font-weight:700}
.detail-sub{margin-left:16px;margin-top:4px;font-size:11px;color:#8A9099}
.funnel-step{margin-bottom:12px}
.funnel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.funnel-name{font-size:12px;font-weight:600;color:#1A1A2E}
.funnel-val{font-size:12px;color:#8A9099}
.funnel-drop{color:#E53935;margin-left:8px;font-size:11px}
.funnel-track{height:24px;background:#F5F7FA;border-radius:6px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:6px;min-width:2px}
.funnel-pct{position:absolute;left:8px;top:4px;font-size:11px;font-weight:600;color:#fff}
.nudge-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.nudge-row+.nudge-row{border-top:1px solid #F0F2F5}
.save-item{display:flex;align-items:center;gap:8px;padding:6px 0}
.save-item+.save-item{border-top:1px solid #F0F2F5}
.save-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-label{font-size:12px;flex:1}
.save-count{font-size:12px;font-weight:600;color:#002D72}
.footer{text-align:center;font-size:10px;color:#8A9099;padding:16px 0 12px;margin-top:8px}
.hidden{display:none}
/* ── Feed sidebar ── */
.feed-sidebar-wrap{display:flex;gap:0;overflow:hidden}
.feed-sidebar{width:160px;flex-shrink:0;border-right:1px solid #E8ECF0;display:flex;flex-direction:column;transition:width .2s ease,opacity .2s ease}
.feed-sidebar.collapsed{width:0;overflow:hidden;border-right:none;opacity:0;pointer-events:none}
.feed-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 6px;border-bottom:1px solid #E8ECF0;flex-shrink:0}
.feed-sidebar-label{font-size:9px;font-weight:700;color:#8A9099;letter-spacing:.7px;text-transform:uppercase}
.feed-sidebar-search{padding:6px 10px;border-bottom:1px solid #E8ECF0;flex-shrink:0}
.feed-sidebar-search input{width:100%;padding:4px 7px;border-radius:6px;border:1px solid #E8ECF0;font-size:11px;font-family:inherit;color:#1A1A2E;outline:none}
.feed-sidebar-search input:focus{border-color:#0960BB}
.feed-sidebar-list{flex:1}
.feed-sidebar-item{display:flex;align-items:center;padding:7px 12px;cursor:pointer;border-bottom:1px solid #F5F7FA;transition:background .12s;border-left:3px solid transparent;white-space:nowrap}
.feed-sidebar-item:hover{background:#F5F7FA}
.feed-sidebar-item.active{background:#002D720D;border-left-color:#002D72}
.feed-sidebar-item.active .fsn{color:#002D72;font-weight:700}
.fsn{font-size:11px;font-weight:500;color:#1A1A2E;overflow:hidden;text-overflow:ellipsis}
.feed-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer;transition:all .15s;flex-shrink:0}
.feed-toggle-btn:hover{border-color:#0960BB;color:#0960BB}
.feed-toggle-btn.open{border-color:#002D72;color:#002D72;background:#002D720A}
.date-quick{padding:4px 10px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer;font-family:inherit;transition:all .15s}
.date-quick:hover{border-color:#0960BB;color:#0960BB;background:#0960BB0A}
.date-quick.active{border-color:#002D72;color:#002D72;background:#002D720D}
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      <div style="position:relative;display:inline-block"><div class="title">CommandBar Analytics<span style="margin-left:10px;font-size:11px;font-weight:300;letter-spacing:.5px;color:rgba(255,255,255,0.35);vertical-align:middle">v2.6.0</span></div><div class="subtitle" id="period-label">SouthState Correspondent</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:4px;align-items:center">
        <button class="date-quick" onclick="setQuickDate('7d')">7D</button>
        <button class="date-quick" onclick="setQuickDate('month')">Month</button>
        <button class="date-quick" onclick="setQuickDate('quarter')">Quarter</button>
        <button class="date-quick" onclick="setQuickDate('year')">Year</button>
      </div>
      <input type="date" id="date-from" min="2026-03-29" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <span style="font-size:11px;color:#8A9099">to</span>
      <input type="date" id="date-to" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <button class="import-btn" id="fetch-btn" onclick="fetchAPI()" style="background:#2E7D32">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Fetch
      </button>
      <input type="file" id="csv-input" accept=".csv,.tsv,.txt" style="display:none">
      <button class="import-btn" id="csv-btn" onclick="document.getElementById('csv-input').click()" style="background:#8A9099;display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV
      </button>
    </div>
  </div>
  <div id="import-msg"></div>
  <!-- Tabs -->
  <div id="tabs-bar" class="tabs">
    <button class="tab active" data-tab="contacts">Contacts</button>
    <button class="tab" data-tab="companies">Companies</button>
    <button class="tab" data-tab="map">Map</button>
    <button class="tab" data-tab="art">Acq Risk Tool</button>
  </div>
  <!-- Tab Panels -->
  <div id="tab-contacts"></div>
  <div id="tab-companies" class="hidden"></div>
  <div id="tab-map" class="hidden"></div>
  <div id="tab-art" class="hidden"></div>
  <div class="footer" id="footer">CommandBar Analytics Dashboard v2.6.0 · Powered by SiteImprove Events + Leadfeeder · SouthState Correspondent</div>
</div>
<script>
// ── DATA ──
let RAW_DATA = [];
let RAW_DATA_ALL = [];
let PERIOD = "";
let hasData = false;
let currentTab = "contacts";



let charts = {};
const CL = {navy:"#002D72",blue:"#0960BB",gold:"#FFBF3F",red:"#E53935",grey:"#8A9099",green:"#2E7D32"};
function trunc(s,n=40){return s.length>n?s.slice(0,n-1)+"\u2026":s}
function badge(pct){const cls=pct>=50?"strong":pct>0?"mixed":"weak";const color=pct>=50?CL.blue:pct>0?CL.gold:CL.red;return `<span class="badge badge-${cls}"><span class="badge-dot" style="background:${color}"></span>${cls.charAt(0).toUpperCase()+cls.slice(1)}</span>`;}
function card(label,value,sub,accent){accent=accent||CL.navy;return `<div class="card"><div class="card-label">${label}</div><div class="card-value" style="color:${accent}">${value}</div>${sub?`<div class="card-sub">${sub}</div>`:""}</div>`;}
// ── LEADFEEDER FEED STATE ──
var LF_URL = "https://leadfeeder-proxy.jameswspence.workers.dev";
var LF_FEEDS_STATIC = [
  {id:"adc3fd58-9efb-11ec-a2e4-35bdf72110d7", name:"ICP"},
  {id:"66d325bc-7306-11f0-9c64-5db4939f49ea", name:"Banking and Finance"},
  {id:"d92ac4f6-9f08-11ec-b201-5dbc05743d4b", name:"ARC"},
  {id:"715aff44-9f26-11ec-9d86-7515457aa63b", name:"Loan Command"},
  {id:"3409ff36-15ce-11ed-ade3-47b1039f35fa", name:"ON FIRE"},
];
var lfFeeds = LF_FEEDS_STATIC.slice();
var currentLfFeed = null;
var lfFeedsLoaded = false;
async function fetchLfFeeds(){
  if(lfFeedsLoaded)return;
  try{var resp=await fetch(LF_URL+"/feeds",{cache:'no-store'});var result=await resp.json();if(result.data&&result.data.length>0){lfFeeds=result.data.map(function(f){return{id:f.id,name:f.name||f.id,lead_count:f.lead_count};});}lfFeedsLoaded=true;}catch(e){lfFeedsLoaded=true;}
  renderFeedSidebars();
}
var feedSidebarOpen = true;
function feedSidebarHTML(domId){var collapsed=feedSidebarOpen?'':' collapsed';var html='<div class="feed-sidebar'+collapsed+'" id="'+domId+'"><div class="feed-sidebar-header"><span class="feed-sidebar-label">Feeds</span></div><div class="feed-sidebar-search"><input type="text" placeholder="Search..." oninput="filterFeedSidebar(this.value,\''+domId+'\')" id="'+domId+'-search"></div><div class="feed-sidebar-list" id="'+domId+'-list">'+feedSidebarItems()+'</div></div>';return html;}
function feedSidebarItems(filter){filter=(filter||'').toLowerCase();var items='';var allActive=(currentLfFeed===null);items+='<div class="feed-sidebar-item'+(allActive?' active':'')+'" onclick="setLfFeed(null)"><span class="fsn">All feeds</span></div>';lfFeeds.filter(function(f){return !filter||f.name.toLowerCase().indexOf(filter)>-1}).forEach(function(f){var isActive=(currentLfFeed===f.id);items+='<div class="feed-sidebar-item'+(isActive?' active':'')+'" onclick="setLfFeed(\''+f.id+'\')"><span class="fsn">'+f.name+'</span></div>';});return items;}
function filterFeedSidebar(val,domId){var list=document.getElementById(domId+'-list');if(list)list.innerHTML=feedSidebarItems(val);}
function toggleFeedSidebar(){feedSidebarOpen=!feedSidebarOpen;['co-feed-sidebar','map-feed-sidebar'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.toggle('collapsed',!feedSidebarOpen);});document.querySelectorAll('.feed-toggle-btn').forEach(function(btn){btn.classList.toggle('open',feedSidebarOpen);btn.innerHTML=feedSidebarOpen?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Feeds':'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg> Feeds';});}
function renderFeedSidebars(){['co-feed-sidebar','map-feed-sidebar'].forEach(function(id){var el=document.getElementById(id);if(!el)return;var searchEl=document.getElementById(id+'-search');var searchVal=searchEl?searchEl.value:'';el.outerHTML=feedSidebarHTML(id);var newSearch=document.getElementById(id+'-search');if(newSearch&&searchVal)newSearch.value=searchVal;});}
function setLfFeed(feedId){currentLfFeed=feedId||null;companiesData=null;mapStateData=null;companyPagesCache={};renderFeedSidebars();if(currentTab==='companies')fetchCompanies();else if(currentTab==='map')fetchMapData();else fetchCompanies();}
// ── PARSE ──
function parseCSV(text){const lines=text.split(/\r?\n/);let period="",headerIdx=0;for(let i=0;i<Math.min(lines.length,10);i++){if(lines[i].includes("Period:"))period=lines[i].replace(/.*Period:\s*/,"").trim();if(lines[i].replace(/"/g,"").startsWith("Category")){headerIdx=i;break;}}const results=[];const allRows=[];for(const line of lines.slice(headerIdx+1).filter(l=>l.trim())){const p=line.split("\t").map(s=>s.replace(/^"|"$/g,"").trim());if(p.length<6)continue;const row={category:p[0],action:p[1],label:p[2],events:parseInt(p[3],10)||0,visits:parseInt(p[5],10)||0};allRows.push(row);if(p[0]==="CommandBar")results.push(row);}return{data:results,allRows:allRows,period:period||null};}
// ── RENDER ──
function render(){
  Object.values(charts).forEach(c=>c.destroy());charts={};
  document.getElementById("period-label").textContent=(PERIOD?PERIOD+" \u00b7 ":"")+"SouthState Correspondent";
  if(currentTab==="companies")renderCompaniesTab();
  if(currentTab==="map")renderMapTab();
  buildContactsIndex();
  if(currentTab==="contacts")renderContactsTab();
}// end render()
// ── COMPANIES TAB RENDER ──
function renderCompaniesTab(){var chtml='<div style="display:flex;gap:0;border-radius:12px;border:1px solid #E8ECF0;background:#fff;box-shadow:0 1px 3px rgba(0,45,114,.04);margin-bottom:16px;overflow:hidden">';chtml+=feedSidebarHTML("co-feed-sidebar");chtml+='<div style="flex:1;min-width:0;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><div class="chart-title" style="margin-bottom:0">Visitor Companies</div><button class="feed-toggle-btn open" onclick="toggleFeedSidebar()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Feeds</button></div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#8A9099;cursor:pointer"><input type="checkbox" id="co-filter-banking" onchange="renderCompaniesTable()"> Banking &amp; Finance only</label><label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#8A9099;cursor:pointer"><input type="checkbox" id="co-filter-internal" checked onchange="renderCompaniesTable()"> Hide internal</label><select id="co-sort" onchange="renderCompaniesTable()" style="padding:4px 8px;border-radius:6px;border:1px solid #E8ECF0;font-size:11px;font-family:inherit"><option value="quality">Quality Score</option><option value="last_visit">Last Visit</option><option value="name">Name</option><option value="employees">Employees</option></select><button class="import-btn" id="co-fetch-btn" onclick="fetchCompanies()" style="background:#2E7D32;padding:5px 12px;font-size:11px">Reload</button></div></div><div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"><input type="text" id="co-search-name" placeholder="Search company name..." oninput="renderCompaniesTable()" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;flex:1;min-width:160px"><input type="text" id="co-search-state" placeholder="Filter by state..." oninput="renderCompaniesTable()" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;width:140px"></div><div id="co-status" style="font-size:11px;color:#8A9099;margin-bottom:8px"></div><div id="co-table"></div></div></div><div id="co-insights"></div>';document.getElementById("tab-companies").innerHTML=chtml;if(companiesData)renderCompaniesTable();}
// ── MAP TAB RENDER ──
function renderMapTab(){var mhtml='<div style="display:flex;gap:0;border-radius:12px;border:1px solid #E8ECF0;background:#fff;box-shadow:0 1px 3px rgba(0,45,114,.04);margin-bottom:16px;overflow:hidden">';mhtml+=feedSidebarHTML("map-feed-sidebar");mhtml+='<div style="flex:1;min-width:0;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><div id="map-breadcrumb"><span class="chart-title" style="margin-bottom:0">Bank Visitor Map</span></div><button class="feed-toggle-btn open" onclick="toggleFeedSidebar()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Feeds</button></div><div style="display:flex;gap:6px;align-items:center"><button id="map-back-btn" onclick="mapGoBack()" style="display:none;padding:4px 12px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:11px;cursor:pointer;color:#0960BB;font-weight:600">\u2190 Back</button><button class="import-btn" onclick="fetchMapData()" style="background:#2E7D32;padding:5px 12px;font-size:11px">Reload</button></div></div><div id="map-status" style="font-size:11px;color:#8A9099;margin-bottom:8px"></div><div id="map-container" style="position:relative;width:100%;min-height:400px"></div></div></div><div id="map-detail" style="margin-top:8px"></div>';document.getElementById("tab-map").innerHTML=mhtml;if(companiesData&&mapStateData)renderUSMap();}
// ── COMPANIES ──

function lfLeadsUrl(page,startDate,endDate){var base=currentLfFeed?LF_URL+"/feeds/"+currentLfFeed+"/leads":LF_URL+"/leads";return base+"?start_date="+startDate+"&end_date="+endDate+"&page="+page+"&page_size=100";}

const WORKER_URL = "https://siteimprove-proxy.jameswspence.workers.dev";
async function fetchSiteImproveRange(fromStr, toStr, category, statusCb) {
  var catParam = category ? "&category=" + encodeURIComponent(category) : "";
  var days = splitIntoDays(fromStr, toStr);

  // Fetch a single day with automatic pagination (handles >1000 rows per day)
  async function fetchDay(dayStr) {
    var allRows = [];
    var page = 1;
    while (true) {
      var url = WORKER_URL + "?period=" + dayStr + "&page_size=1000&page=" + page + catParam;
      var resp = await fetch(url, { cache: 'no-store' });
      var result = await resp.json();
      if (result.error) throw new Error(result.error + (result.detail ? " \u2014 " + result.detail : ""));
      var rows = result.data || [];
      allRows = allRows.concat(rows);
      if (rows.length < 1000) break; // last page
      page++;
      if (page > 10) break; // safety cap at 10k rows per day
    }
    return allRows;
  }

  if (days.length === 1) {
    if (statusCb) statusCb("Fetching...");
    return await fetchDay(days[0]);
  }

  if (statusCb) statusCb("Fetching " + days.length + " days...");
  var allChunkResults = [];
  var batchSize = 7;
  for (var b = 0; b < days.length; b += batchSize) {
    var batch = days.slice(b, b + batchSize);
    if (statusCb) statusCb("Fetching days " + (b + 1) + "-" + Math.min(b + batchSize, days.length) + " of " + days.length + "...");
    var batchFetches = batch.map(function(day) {
      return fetchDay(day).catch(function() { return []; });
    });
    var batchResults = await Promise.all(batchFetches);
    allChunkResults = allChunkResults.concat(batchResults);
  }
  var data = mergeEventRows(allChunkResults);
  return data;
}
function splitIntoDays(fromStr, toStr) {
  var days = [];
  var cur = new Date(fromStr.slice(0,4)+'-'+fromStr.slice(4,6)+'-'+fromStr.slice(6,8)+'T12:00:00');
  var end = new Date(toStr.slice(0,4)+'-'+toStr.slice(4,6)+'-'+toStr.slice(6,8)+'T12:00:00');
  var fmt = function(d){ return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); };
  while(cur <= end) {
    days.push(fmt(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}
function mergeEventRows(allArrays) {
  var merged = {};
  allArrays.forEach(function(arr) { (arr || []).forEach(function(row) { var key = (row.category||'') + '|' + (row.action||'') + '|' + (row.label||''); if(!merged[key]) merged[key] = {category:row.category, action:row.action, label:row.label, events:0, visits:0}; merged[key].events += (row.events||0); merged[key].visits += (row.visits||0); }); });
  return Object.values(merged);
}

function renderARTTab(){var el=document.getElementById("tab-art");if(!el)return;var html='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px"><div class="chart-title" style="margin-bottom:0">Acquisition Risk Tool</div><div style="display:flex;align-items:center;gap:8px"><span id="art-status" style="font-size:11px;color:#8A9099">'+(artData?artData.length+' rows loaded':'Not yet loaded')+'</span><button id="art-fetch-btn" class="import-btn" onclick="fetchART()" style="background:#2E7D32;padding:5px 12px;font-size:11px">Reload</button></div></div><div id="art-content">';if(!artData)html+='<div style="text-align:center;padding:40px;color:#8A9099;font-size:13px">Click Reload to fetch Acquisition Risk Tool data.</div>';html+='</div>';el.innerHTML=html;if(artData)renderARTContent();}
function parseARTLabel(lbl){var certMatch=lbl.match(/^(.*?)\s*\(CERT\s*#(\d+)\),\s*([A-Z]{2})\s*\|\s*Score:\s*(\d+)\s*\|\s*(.+)$/i);if(certMatch){return{bankName:certMatch[1].trim(),cert:certMatch[2],state:certMatch[3].toUpperCase(),score:parseInt(certMatch[4],10),risk:certMatch[5].trim(),raw:lbl};}var stateMatch=lbl.match(/,\s*([A-Z]{2})/);var scoreMatch=lbl.match(/Score:\s*(\d+)/i);var riskMatch=lbl.match(/\|\s*([^|]+)$/);return{bankName:lbl.split('(')[0].trim(),cert:null,state:stateMatch?stateMatch[1]:null,score:scoreMatch?parseInt(scoreMatch[1],10):null,risk:riskMatch?riskMatch[1].trim():null,raw:lbl};}
var artSearch='';var artStateFilter='';var artScoreMin=0;var artScoreMax=100;var artSortField='score';var artSortDir='desc';
function renderARTContent(){var el=document.getElementById("art-content");if(!el||!artData)return;if(artData.length===0){el.innerHTML='<div style="text-align:center;padding:40px;color:#8A9099;font-size:13px">No "'+ART_CATEGORY+'" events found for this date range.</div>';return;}var byLabel={};artData.forEach(function(r){var lbl=r.label||'';var parsed=parseARTLabel(lbl);var key=parsed.cert?parsed.cert:parsed.bankName.toLowerCase();if(!byLabel[key])byLabel[key]=Object.assign(parsed,{events:0,actions:{}});byLabel[key].events+=(r.events||0);var a=r.action||'(none)';byLabel[key].actions[a]=(byLabel[key].actions[a]||0)+(r.events||0);});var allRows=Object.values(byLabel);var certRows=allRows.filter(function(r){return r.cert!==null;});var stateSet={};allRows.forEach(function(r){if(r.state)stateSet[r.state]=true;});var allStates=Object.keys(stateSet).sort();
function riskColor(risk){if(!risk)return'#8A9099';var r=risk.toLowerCase();if(r.indexOf('high')>-1)return CL.red;if(r.indexOf('moderate')>-1)return CL.gold;if(r.indexOf('low')>-1)return CL.green;return'#8A9099';}function scoreColor(score){if(score===null)return'#8A9099';if(score>=70)return CL.red;if(score>=40)return CL.gold;return CL.green;}
var totalEvents=allRows.reduce(function(s,r){return s+r.events;},0);var html='<div class="cards">'+card("Banks Tracked",certRows.length.toLocaleString(),"Unique institutions this period")+card("Total Events",totalEvents.toLocaleString(),"Across all actions",CL.blue)+card("States",allStates.length,"States represented",CL.gold);var highRisk=allRows.filter(function(r){return r.score!==null&&r.score>=70;}).length;if(highRisk>0)html+=card("High Risk",highRisk,"Score 70+",CL.red);html+='</div>';
html+='<div class="chart-card" style="margin-bottom:16px;padding:12px 16px"><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end"><div style="flex:1;min-width:180px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Search Bank</div><input type="text" id="art-search" placeholder="Bank name..." value="'+artSearch+'" oninput="artSetSearch(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div><div style="min-width:100px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">State</div><select id="art-state" onchange="artSetState(this.value)" style="width:100%;padding:6px 8px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"><option value="">All</option>';allStates.forEach(function(st){html+='<option value="'+st+'"'+(artStateFilter===st?' selected':'')+'>'+st+'</option>';});html+='</select></div><div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Min</div><input type="number" id="art-score-min" min="0" max="100" value="'+artScoreMin+'" oninput="artSetScoreMin(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div><div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Max</div><input type="number" id="art-score-max" min="0" max="100" value="'+artScoreMax+'" oninput="artSetScoreMax(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div><div><button onclick="artResetFilters()" style="padding:6px 14px;border-radius:8px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer">Reset</button></div></div></div>';
html+='<div id="art-list">'+renderARTList(allRows,riskColor,scoreColor)+'</div>';
html+='<details style="margin-bottom:16px;margin-top:8px"><summary style="font-size:11px;color:#8A9099;cursor:pointer;padding:8px 0">\u25b6 Raw event schema (first 5 rows)</summary><div style="margin-top:8px;padding:12px;border-radius:8px;background:#F5F7FA;font-family:monospace;font-size:11px;color:#4C4C4C;overflow-x:auto;white-space:pre">'+JSON.stringify(artData.slice(0,5),null,2).replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></details>';el.innerHTML=html;}
function renderARTList(allRows,riskColor,scoreColor){if(!riskColor)riskColor=function(risk){if(!risk)return'#8A9099';var r=risk.toLowerCase();if(r.indexOf('high')>-1)return CL.red;if(r.indexOf('moderate')>-1)return CL.gold;if(r.indexOf('low')>-1)return CL.green;return'#8A9099';};if(!scoreColor)scoreColor=function(score){if(score===null)return'#8A9099';if(score>=70)return CL.red;if(score>=40)return CL.gold;return CL.green;};var filtered=allRows.filter(function(r){if(artSearch&&r.bankName.toLowerCase().indexOf(artSearch.toLowerCase())===-1)return false;if(artStateFilter&&r.state!==artStateFilter)return false;if(r.score!==null){if(r.score<artScoreMin||r.score>artScoreMax)return false;}return true;});filtered.sort(function(a,b){if(artSortField==='bankName')return artSortDir==='asc'?a.bankName.localeCompare(b.bankName):b.bankName.localeCompare(a.bankName);if(artSortField==='state')return artSortDir==='asc'?(a.state||'').localeCompare(b.state||''):(b.state||'').localeCompare(a.state||'');if(artSortField==='score')return artSortDir==='asc'?(a.score||0)-(b.score||0):(b.score||0)-(a.score||0);if(artSortField==='events')return artSortDir==='asc'?a.events-b.events:b.events-a.events;return 0;});if(filtered.length===0){return'<div style="text-align:center;padding:32px;color:#8A9099;font-size:12px">No banks match the current filters.</div>';}
var html='<div style="font-size:11px;color:#8A9099;margin-bottom:8px">'+filtered.length+' bank'+(filtered.length!==1?'s':'')+' shown</div><div class="chart-card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:2px solid #E8ECF0">';[{l:'Bank',f:'bankName',a:'left'},{l:'State',f:'state',a:'center'},{l:'Score',f:'score',a:'center'},{l:'Risk',f:'risk',a:'center'},{l:'Views',f:'events',a:'center'}].forEach(function(col){var active=artSortField===col.f;var arrow=active?(artSortDir==='desc'?' \u25BC':' \u25B2'):'';html+='<th onclick="artSort(\''+col.f+'\')" style="text-align:'+col.a+';padding:10px 12px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:'+(active?'#002D72':'#8A9099')+'">'+col.l+arrow+'</th>';});html+='</tr></thead><tbody>';
filtered.forEach(function(row,i){var sc=scoreColor(row.score);var rc=riskColor(row.risk);html+='<tr style="border-bottom:1px solid #F0F2F5;'+(i%2===1?'background:#FAFBFC;':'')+'">';html+='<td style="padding:9px 12px"><div style="font-weight:600;color:#1A1A2E">'+row.bankName+'</div>';if(row.cert)html+='<div style="font-size:10px;color:#8A9099">CERT #'+row.cert+'</div>';html+='</td>';html+='<td style="text-align:center;padding:9px 12px"><span style="font-size:12px;font-weight:700;color:#002D72">'+(row.state||'\u2013')+'</span></td>';html+='<td style="text-align:center;padding:9px 12px">';if(row.score!==null){html+='<div style="display:flex;align-items:center;gap:6px;justify-content:center"><div style="width:48px;height:5px;background:#F0F2F5;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+row.score+'%;background:'+sc+';border-radius:3px"></div></div><span style="font-size:13px;font-weight:700;color:'+sc+'">'+row.score+'</span></div>';}else{html+='<span style="color:#D0D5DD">\u2013</span>';}html+='</td>';html+='<td style="text-align:center;padding:9px 12px">';if(row.risk){html+='<span style="font-size:10px;font-weight:600;color:'+rc+';background:'+rc+'14;border-radius:6px;padding:2px 8px">'+row.risk+'</span>';}else{html+='<span style="color:#D0D5DD">\u2013</span>';}html+='</td>';html+='<td style="text-align:center;padding:9px 12px;font-weight:700;color:#002D72">'+row.events+'</td></tr>';});html+='</tbody></table></div>';return html;}
function artSort(field){if(artSortField===field)artSortDir=artSortDir==='desc'?'asc':'desc';else{artSortField=field;artSortDir=field==='bankName'||field==='state'?'asc':'desc';}artRefreshList();}
function artSetSearch(val){artSearch=val;artRefreshList();}function artSetState(val){artStateFilter=val;artRefreshList();}function artSetScoreMin(val){artScoreMin=parseInt(val,10)||0;artRefreshList();}function artSetScoreMax(val){artScoreMax=parseInt(val,10)||100;artRefreshList();}function artResetFilters(){artSearch='';artStateFilter='';artScoreMin=0;artScoreMax=100;renderARTContent();}
function artRefreshList(){var list=document.getElementById('art-list');if(!list||!artData)return;var byLabel={};artData.forEach(function(r){var lbl=r.label||'';var parsed=parseARTLabel(lbl);var key=parsed.cert?parsed.cert:parsed.bankName.toLowerCase();if(!byLabel[key])byLabel[key]=Object.assign(parsed,{events:0,actions:{}});byLabel[key].events+=(r.events||0);});list.innerHTML=renderARTList(Object.values(byLabel));}

async function exportPDF(){var btn=document.getElementById("export-btn");if(!btn)return;var origText=btn.innerHTML;btn.innerHTML="Generating...";btn.style.opacity=".6";btn.style.pointerEvents="none";try{const{jsPDF}=window.jspdf;const pdf=new jsPDF("l","mm","a4");const pw=pdf.internal.pageSize.getWidth();const ph=pdf.internal.pageSize.getHeight();const margin=12;const contentW=pw-margin*2;const headerH=27;const footerH=8;const availH=ph-headerH-footerH;let pageCount=0;function drawHeader(title,contd){pdf.setFillColor(0,45,114);pdf.rect(0,0,pw,18,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(14);pdf.setTextColor(255,255,255);pdf.text("CommandBar Analytics v2.6.0",margin,12);pdf.setFont("helvetica","normal");pdf.setFontSize(9);pdf.text((PERIOD?PERIOD+" \u00b7 ":"")+"SouthState Correspondent",pw-margin,12,{align:"right"});pdf.setFillColor(9,96,187);pdf.rect(0,18,pw,6,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(8);pdf.setTextColor(255,255,255);pdf.text(title.toUpperCase()+(contd?" (CONTINUED)":""),margin,22.5);pdf.setTextColor(0,0,0);}function drawFooter(n){pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(138,144,153);pdf.text("CommandBar Analytics Dashboard v2.6.0 \u00b7 SiteImprove Events",margin,ph-5);pdf.text("Page "+n,pw-margin,ph-5,{align:"right"});}function addPage(title,contd){if(pageCount>0)pdf.addPage();pageCount++;drawHeader(title,contd||false);drawFooter(pageCount);}async function captureAndAdd(el,tabName){const canvas=await html2canvas(el,{scale:2,backgroundColor:"#F5F7FA",useCORS:true,logging:false,windowWidth:980});const imgData=canvas.toDataURL("image/jpeg",0.92);const imgW=contentW;const imgH=(canvas.height/canvas.width)*contentW;const finalH=Math.min(imgH,availH);const finalW=imgH>availH?(availH/imgH)*imgW:imgW;const xOff=margin+(contentW-finalW)/2;addPage(tabName);pdf.addImage(imgData,"JPEG",xOff,headerH,finalW,finalH);}const tabs=["content","insights","engagement","historical","leaderboard","companies","map","art"];const tabNames=["Content","Performance","Activity","Compare","Trending","Companies","Map","Acq Risk Tool"];const savedTab=currentTab;for(let i=0;i<tabs.length;i++){tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display=t===tabs[i]?"block":"none";el.classList.remove("hidden");});await new Promise(r=>setTimeout(r,600));if(tabs[i]==="content"){await captureAndAdd(document.getElementById("content-charts"),"Content");}else{await captureAndAdd(document.getElementById("tab-"+tabs[i]),tabNames[i]);}}tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==savedTab);});pdf.save("CommandBar-Analytics"+(PERIOD?"-"+PERIOD.replace(/[^a-zA-Z0-9]+/g,"-"):"")+".pdf");}catch(err){console.error("PDF export error:",err);document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>PDF export failed: '+err.message+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';["contacts","content","insights","engagement","historical","leaderboard","companies","map","art"].forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==currentTab);});}btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";}
// ── INIT ──
if(new URLSearchParams(window.location.search).has("csv")){var csvBtn=document.getElementById("csv-input");if(csvBtn)csvBtn.style.display="";}
render();
