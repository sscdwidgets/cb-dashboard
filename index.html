<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommandBar Analytics Dashboard v2.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;color:#1A1A2E;padding:20px 16px}
.wrap{max-width:980px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:8px;background:#002D72;display:flex;align-items:center;justify-content:center}
.title{font-size:19px;font-weight:700;color:#002D72;letter-spacing:-.3px}
.subtitle{font-size:12px;color:#8A9099}
.import-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#002D72;color:#fff;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;border:none}
.import-btn:hover{opacity:.85}
.import-msg{margin:8px 0 4px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.import-msg.success{background:#2E7D3214;color:#2E7D32}
.import-msg.error{background:#E5393514;color:#E53935}
.import-msg .close{cursor:pointer;opacity:.6;font-size:16px}
.tabs{display:flex;gap:6px;margin:16px 0 18px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E8ECF0;background:#fff;color:#8A9099;letter-spacing:.2px;transition:all .15s}
.tab.active{border-color:#0960BB;background:#0960BB0D;color:#0960BB}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{flex:1 1 160px;padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.card-label{font-size:10px;font-weight:700;color:#8A9099;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.card-value{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card-sub{font-size:11px;color:#8A9099;margin-top:3px}
.charts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.chart-card{padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.chart-title{font-size:12px;font-weight:700;color:#002D72;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;overflow:hidden}
.insights{padding:16px 20px;border-radius:12px;background:#002D72;color:#fff;margin-bottom:16px}
.insights h3{font-size:13px;font-weight:700;margin-bottom:8px}
.insights div{font-size:12px;line-height:1.7;opacity:.88}
.insights strong{color:#FFBF3F}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-strong{background:#0960BB14;color:#0960BB}
.badge-mixed{background:#FFBF3F14;color:#FFBF3F}
.badge-weak{background:#E5393514;color:#E53935}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.top5-item{padding:5px 0}
.top5-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.top5-title{font-size:11px;color:#1A1A2E;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.top5-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.top5-count{font-size:11px;font-weight:700;color:#002D72}
.top5-bar{height:6px;background:#F5F7FA;border-radius:3px;overflow:hidden}
.top5-fill{height:100%;border-radius:3px;transition:width .4s ease}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:2px solid #E8ECF0}
th{padding:10px 8px;font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none;transition:color .15s}
th:first-child{text-align:left}
th:hover{color:#002D72}
td{padding:8px 8px;text-align:center}
td:first-child{text-align:left;font-weight:500;max-width:300px}
td:first-child div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{border-bottom:1px solid #F0F2F5}
tbody tr:nth-child(even){background:#FAFBFC}
.type-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block}
.detail-item{padding:8px 0;border-bottom:1px solid #F0F2F5}
.detail-item:last-child{border-bottom:none}
.detail-row{display:flex;justify-content:space-between;align-items:center}
.detail-left{display:flex;align-items:center;gap:8px}
.detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-label{font-size:12px;font-weight:600;color:#1A1A2E}
.detail-count{font-size:14px;font-weight:700}
.detail-sub{margin-left:16px;margin-top:4px;font-size:11px;color:#8A9099}
.funnel-step{margin-bottom:12px}
.funnel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.funnel-name{font-size:12px;font-weight:600;color:#1A1A2E}
.funnel-val{font-size:12px;color:#8A9099}
.funnel-drop{color:#E53935;margin-left:8px;font-size:11px}
.funnel-track{height:24px;background:#F5F7FA;border-radius:6px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:6px;min-width:2px}
.funnel-pct{position:absolute;left:8px;top:4px;font-size:11px;font-weight:600;color:#fff}
.nudge-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.nudge-row+.nudge-row{border-top:1px solid #F0F2F5}
.save-item{display:flex;align-items:center;gap:8px;padding:6px 0}
.save-item+.save-item{border-top:1px solid #F0F2F5}
.save-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-label{font-size:12px;flex:1}
.save-count{font-size:12px;font-weight:600;color:#002D72}
.footer{text-align:center;font-size:10px;color:#8A9099;padding:16px 0 12px;margin-top:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      <div><div class="title">CommandBar Analytics</div><div class="subtitle" id="period-label">SouthState Correspondent</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="date" id="date-from" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <span style="font-size:11px;color:#8A9099">to</span>
      <input type="date" id="date-to" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <button class="import-btn" id="fetch-btn" onclick="fetchAPI()" style="background:#2E7D32">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Fetch
      </button>
      <input type="file" id="csv-input" accept=".csv,.tsv,.txt" style="display:none">
      <button class="import-btn" id="csv-btn" onclick="document.getElementById('csv-input').click()" style="background:#8A9099;display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV
      </button>
      <button class="import-btn" id="export-btn" onclick="exportPDF()" style="background:#0960BB">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </button>
    </div>
  </div>
  <div id="import-msg"></div>

  <!-- Tabs -->
  <div id="tabs-bar" class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="content">Content</button>
    <button class="tab" data-tab="insights">Performance</button>
    <button class="tab" data-tab="engagement">Activity</button>
    <button class="tab" data-tab="historical">Compare</button>
    <button class="tab" data-tab="leaderboard">Trending</button>
    <button class="tab" data-tab="companies">Companies</button>
    <button class="tab" data-tab="map">Map</button>
  </div>

  <!-- Tab Panels -->
  <div id="tab-overview"></div>
  <div id="tab-content" class="hidden"></div>
  <div id="tab-insights" class="hidden"></div>
  <div id="tab-engagement" class="hidden"></div>
  <div id="tab-historical" class="hidden"></div>
  <div id="tab-leaderboard" class="hidden"></div>
  <div id="tab-companies" class="hidden"></div>
  <div id="tab-map" class="hidden"></div>

  <div class="footer" id="footer">CommandBar Analytics Dashboard v2.1 · Powered by SiteImprove Events · SouthState Correspondent</div>
</div>

<script>
// ── DATA ──
let RAW_DATA = [];
let PERIOD = "";
let hasData = false;
let currentTab = "overview";
let contentSortField = "total";
let contentSortDir = "desc";
let contentShowAll = false;
let charts = {};

const CL = {navy:"#002D72",blue:"#0960BB",gold:"#FFBF3F",red:"#E53935",grey:"#8A9099",green:"#2E7D32"};

function trunc(s,n=40){return s.length>n?s.slice(0,n-1)+"\u2026":s}
function badge(pct){
  const cls=pct>=50?"strong":pct>0?"mixed":"weak";
  const color=pct>=50?CL.blue:pct>0?CL.gold:CL.red;
  return `<span class="badge badge-${cls}"><span class="badge-dot" style="background:${color}"></span>${cls.charAt(0).toUpperCase()+cls.slice(1)}</span>`;
}
function card(label,value,sub,accent){
  accent=accent||CL.navy;
  return `<div class="card"><div class="card-label">${label}</div><div class="card-value" style="color:${accent}">${value}</div>${sub?`<div class="card-sub">${sub}</div>`:""}</div>`;
}

// ── PARSE ──
function parseCSV(text){
  const lines=text.split(/\r?\n/);
  let period="",headerIdx=0;
  for(let i=0;i<Math.min(lines.length,10);i++){
    if(lines[i].includes("Period:"))period=lines[i].replace(/.*Period:\s*/,"").trim();
    if(lines[i].replace(/"/g,"").startsWith("Category")){headerIdx=i;break;}
  }
  const results=[];
  for(const line of lines.slice(headerIdx+1).filter(l=>l.trim())){
    const p=line.split("\t").map(s=>s.replace(/^"|"$/g,"").trim());
    if(p.length<6||p[0]!=="CommandBar")continue;
    results.push({action:p[1],label:p[2],events:parseInt(p[3],10)||0,visits:parseInt(p[5],10)||0});
  }
  return{data:results,period:period||null};
}

// ── PROCESS ──
function process(R){
  const get=(a,l)=>R.filter(r=>r.action===a&&(!l||r.label===l)).reduce((s,r)=>s+r.events,0);
  const getV=(a)=>{const r=R.find(x=>x.action===a);return r?r.visits:0;};
  const dailyVisits=get("Daily Visit"),dailyVisitors=getV("Daily Visit"),railOpens=get("Open");
  const nudgeShown=get("Nudge"),nudgeDismiss=get("Nudge Dismiss");
  const clicks=R.filter(r=>r.action==="Click"),clickTotal=clicks.reduce((s,r)=>s+r.events,0);
  const saves=R.filter(r=>r.action==="Save"),saveTotal=saves.reduce((s,r)=>s+r.events,0);
  const shares=R.filter(r=>r.action==="Share"),shareTotal=shares.reduce((s,r)=>s+r.events,0);
  const actionsTotal=clickTotal+saveTotal+shareTotal;
  const myStuff=get("Click","Mystuff"),signup=get("Click","Signup");
  const discover=clicks.filter(c=>c.label.startsWith("Discover")).reduce((s,c)=>s+c.events,0);
  const recent=clicks.filter(c=>c.label.startsWith("Recent")).reduce((s,c)=>s+c.events,0);
  const savedNav=clicks.filter(c=>c.label.startsWith("Saved")).reduce((s,c)=>s+c.events,0);
  const blogNav=get("Click","Blog");
  const podcastNav=get("Click","Podcast");
  const eventsNav=get("Click","Events");
  const otherNav=Math.max(0,clickTotal-myStuff-signup-discover-recent-savedNav-blogNav-podcastNav-eventsNav);

  const actionBreakdown=[
    {name:"My Stuff",value:myStuff,color:CL.navy},{name:"Share",value:shareTotal,color:CL.green},
    {name:"Signup",value:signup,color:CL.blue},{name:"Save",value:saveTotal,color:CL.gold},
    {name:"Recent Nav",value:recent,color:"#6B7280"},{name:"Saved Nav",value:savedNav,color:"#8B5CF6"},
    {name:"Discover",value:discover,color:"#0891B2"},{name:"Blog Nav",value:blogNav,color:"#D97706"},
    {name:"Podcast Nav",value:podcastNav,color:"#7C3AED"},{name:"Events Nav",value:eventsNav,color:"#059669"},
    {name:"Other Nav",value:otherNav,color:"#9CA3AF"},
  ].filter(f=>f.value>0).sort((a,b)=>b.value-a.value);

  const actionDetail=[
    {label:"My Stuff opens",count:myStuff,color:CL.navy},
    {label:"Shares",count:shareTotal,color:CL.green,items:[...shares].sort((a,b)=>b.events-a.events).map(s=>s.label+" ("+s.events+")")},
    {label:"Signup clicks",count:signup,color:CL.blue},
    {label:"Saves",count:saveTotal,color:CL.gold,items:saves.map(s=>s.label+" ("+s.events+")")},
    {label:"Discover clicks",count:discover,color:"#0891B2"},
    {label:"Recent navigation",count:recent,color:"#6B7280"},
    {label:"Saved item clicks",count:savedNav,color:"#8B5CF6"},
    {label:"Blog nav",count:blogNav,color:"#D97706"},
    {label:"Podcast nav",count:podcastNav,color:"#7C3AED"},
    {label:"Events nav",count:eventsNav,color:"#059669"},
    {label:"Other clicks",count:otherNav,color:"#9CA3AF"},
  ].filter(f=>f.count>0);

  const content={};
  ["Blog","Page","Podcast"].forEach(ct=>{
    R.filter(r=>r.action===ct).forEach(r=>{
      if(!r.label.includes(": "))return;
      const tier=r.label.split(": ")[0],title=r.label.split(": ").slice(1).join(": ");
      const key=ct+"|"+title;
      if(!content[key])content[key]={title,type:ct,deepRead:0,skim:0,bounce:0,listener:0,deepListen:0};
      const m={"Deep Read":"deepRead","Skim":"skim","Bounce":"bounce","Listener":"listener","Deep Listen":"deepListen"};
      if(m[tier])content[key][m[tier]]=r.events;
    });
  });
  const articles=Object.values(content).map(d=>{
    const total=d.deepRead+d.skim+d.bounce+d.listener+d.deepListen;
    const engaged=d.deepRead+d.listener+d.deepListen;
    return{...d,total,engaged,engPct:total?Math.round(engaged/total*100):0};
  }).sort((a,b)=>b.total-a.total);

  const totalContent=articles.reduce((s,a)=>s+a.total,0);
  const totalEngaged=articles.reduce((s,a)=>s+a.engaged,0);
  const totalSkim=articles.reduce((s,a)=>s+a.skim,0);
  const totalBounce=articles.reduce((s,a)=>s+a.bounce,0);

  return{dailyVisits,dailyVisitors,railOpens,nudgeShown,nudgeDismiss,clickTotal,clicks,saveTotal,saves,shareTotal,shares,actionsTotal,actionBreakdown,actionDetail,articles,totalContent,totalEngaged,totalSkim,totalBounce,myStuff,signup};
}

// ── RENDER ──
function render(){
  const d=process(RAW_DATA);
  const engRate=d.dailyVisits?(d.railOpens/d.dailyVisits*100).toFixed(1):"0";
  const deepPct=d.totalContent?Math.round(d.totalEngaged/d.totalContent*100):0;
  const blogs=d.articles.filter(a=>a.type==="Blog");
  const pods=d.articles.filter(a=>a.type==="Podcast");
  const top5=d.articles.slice(0,5);

  // Destroy old charts
  Object.values(charts).forEach(c=>c.destroy());
  charts={};

  document.getElementById("period-label").textContent=(PERIOD?PERIOD+" \u00b7 ":"")+"SouthState Correspondent";

  // ── OVERVIEW ──
  let html=`<div class="cards">${card("Daily Visitors",d.dailyVisits,d.dailyVisitors+" unique sessions")}${card("Rail Opens",d.railOpens,engRate+"% of visitors",CL.blue)}${card("Actions",d.actionsTotal,d.clickTotal+" clicks, "+d.saveTotal+" saves, "+d.shareTotal+" shares",CL.green)}</div>`;
  html+=`<div class="charts">`;
  html+=`<div class="chart-card" style="flex:1 1 300px"><div class="chart-title">Engagement Funnel</div><div class="chart-wrap" style="height:170px"><canvas id="c-funnel"></canvas></div></div>`;
  html+=`<div class="chart-card" style="flex:1 1 180px"><div class="chart-title">Content by Type</div><div class="chart-wrap" style="height:170px"><canvas id="c-type"></canvas></div></div>`;
  html+=`<div class="chart-card" style="flex:1 1 240px"><div class="chart-title">Top 5 Content</div>`;
  top5.forEach((a,i)=>{
    const pct=top5[0].total>0?(a.total/top5[0].total*100):0;
    const color=a.engPct>=50?CL.blue:a.engPct>0?CL.gold:CL.red;
    html+=`<div class="top5-item"><div class="top5-row"><span class="top5-title">${trunc(a.title,32)}</span><div class="top5-right"><span class="top5-count">${a.total}</span>${badge(a.engPct)}</div></div><div class="top5-bar"><div class="top5-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  });
  html+=`</div></div>`;
  html+=`<div class="insights"><h3>Quick Insights</h3><div><div><strong>Reach:</strong> ${d.dailyVisits} unique daily visitors across ${d.dailyVisitors} sessions.</div><div><strong>Engagement:</strong> ${engRate}% of visitors opened the rail. ${d.articles.length} pieces tracked with ${deepPct}% engaged.</div><div><strong>Actions:</strong> ${d.shareTotal} shares, ${d.saveTotal} saves, ${d.clickTotal} navigation clicks.</div></div></div>`;
  document.getElementById("tab-overview").innerHTML=html;

  // Charts
  const funnelData=[{l:"Daily Visitors",v:d.dailyVisits,c:CL.blue},{l:"Rail Opens",v:d.railOpens,c:CL.gold},{l:"Actions",v:d.actionsTotal,c:CL.green}];
  charts.funnel=new Chart(document.getElementById("c-funnel"),{type:"bar",data:{labels:funnelData.map(f=>f.l),datasets:[{data:funnelData.map(f=>f.v),backgroundColor:funnelData.map(f=>f.c),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099"}},x:{grid:{display:false},ticks:{font:{size:11},color:"#8A9099"}}}}});

  const blogTotal=blogs.reduce((s,a)=>s+a.total,0),pageTotal=d.articles.filter(a=>a.type==="Page").reduce((s,a)=>s+a.total,0),podTotal=pods.reduce((s,a)=>s+a.total,0);
  const typeData=[blogTotal,pageTotal,podTotal].filter(v=>v>0);
  const typeLabels=["Blog","Page","Podcast"].filter((_,i)=>[blogTotal,pageTotal,podTotal][i]>0);
  const typeColors=[CL.blue,"#8A9099",CL.gold].filter((_,i)=>[blogTotal,pageTotal,podTotal][i]>0);
  charts.type=new Chart(document.getElementById("c-type"),{type:"doughnut",data:{labels:typeLabels,datasets:[{data:typeData,backgroundColor:typeColors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:8}}}}});

  // ── ENGAGEMENT TAB ──
  let ehtml=`<div class="cards">${card("Daily Visitors",d.dailyVisits,d.dailyVisitors+" unique sessions",CL.blue)}${card("Rail Opens",d.railOpens,engRate+"% of visitors",CL.gold)}${card("Total Actions",d.actionsTotal,d.clickTotal+" clicks, "+d.saveTotal+" saves, "+d.shareTotal+" shares",CL.green)}${card("Nudges Shown",d.nudgeShown,d.nudgeDismiss+" dismissed",CL.navy)}</div>`;

  // Conversion funnel + Feature usage
  ehtml+=`<div class="charts">`;
  ehtml+=`<div class="chart-card" style="flex:1 1 400px"><div class="chart-title">Conversion Funnel</div>`;
  const fSteps=funnelData;
  fSteps.forEach((step,i)=>{
    const pct=fSteps[0].v?(step.v/fSteps[0].v*100):0;
    const prev=i>0?fSteps[i-1].v:0;
    const drop=i>0&&prev>0?((1-step.v/prev)*100).toFixed(0):null;
    ehtml+=`<div class="funnel-step"><div class="funnel-header"><span class="funnel-name">${step.l}</span><span class="funnel-val">${step.v.toLocaleString()}${drop?`<span class="funnel-drop">\u2193${drop}%</span>`:""}</span></div><div class="funnel-track"><div class="funnel-fill" style="width:${pct}%;background:${step.c}">${pct>5?`<span class="funnel-pct">${pct.toFixed(1)}%</span>`:""}</div></div></div>`;
  });
  ehtml+=`</div>`;
  ehtml+=`<div class="chart-card" style="flex:1 1 350px"><div class="chart-title">Feature Usage</div><div class="chart-wrap" style="height:${Math.max(140,d.actionBreakdown.length*28+20)}px"><canvas id="c-features"></canvas></div></div>`;
  ehtml+=`</div>`;

  // Actions detail + Nudge performance
  ehtml+=`<div class="charts">`;
  ehtml+=`<div class="chart-card" style="flex:1 1 400px"><div class="chart-title">Actions Detail</div>`;
  d.actionDetail.forEach(item=>{

var LF_URL="https://leadfeeder-proxy.jameswspence.workers.dev";
var companiesData=null;
var INTERNAL_NAMES=["SouthState Bank","SouthState Securities","First Federal","SouthState Correspondent"];

async function fetchCompanies(){
  var btn=document.getElementById("co-fetch-btn");
  var status=document.getElementById("co-status");
  var fromEl=document.getElementById("date-from");
  var toEl=document.getElementById("date-to");

  var startDate=fromEl&&fromEl.value?fromEl.value:defaultDateStr(-6);
  var endDate=toEl&&toEl.value?toEl.value:defaultDateStr(0);

  var origText=btn.innerHTML;
  btn.innerHTML="Loading...";btn.style.opacity=".6";btn.style.pointerEvents="none";
  status.textContent="Fetching companies...";

  try{
    var allLeads=[];
    var pg=1;
    var more=true;
    while(more&&pg<=5){
      status.textContent="Fetching page "+pg+"...";
      var resp=await fetch(LF_URL+"/leads?start_date="+startDate+"&end_date="+endDate+"&page="+pg+"&page_size=100");
      var result=await resp.json();
      if(result.error)throw new Error(result.error);
      allLeads=allLeads.concat(result.data||[]);
      more=(result.data||[]).length>=100;
      pg++;
    }
    companiesData=allLeads;
    status.innerHTML='<span style="color:#2E7D32">'+allLeads.length+' companies loaded.</span>';
    renderCompaniesTable();
  }catch(err){
    status.innerHTML='<span style="color:#E53935">Failed: '+err.message+'</span>';
  }

  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

function defaultDateStr(offset){
  var d=new Date();d.setDate(d.getDate()+offset);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function renderCompaniesTable(){
  var el=document.getElementById("co-table");
  if(!el||!companiesData)return;

  var bankingOnly=document.getElementById("co-filter-banking");
  var hideInternal=document.getElementById("co-filter-internal");
  var sortBy=(document.getElementById("co-sort")||{}).value||"quality";
  var nameSearch=((document.getElementById("co-search-name")||{}).value||"").toLowerCase().trim();
  var stateSearch=((document.getElementById("co-search-state")||{}).value||"").toLowerCase().trim();

  var filtered=companiesData.filter(function(c){
    if(hideInternal&&hideInternal.checked&&INTERNAL_NAMES.some(function(n){return c.name.indexOf(n)>-1}))return false;
    if(bankingOnly&&bankingOnly.checked){
      var ind=(c.industry||"").toLowerCase();
      if(!(ind.indexOf("bank")>-1||ind.indexOf("financial")>-1||ind.indexOf("credit")>-1||ind.indexOf("investment")>-1))return false;
    }
    if(nameSearch&&(c.name||"").toLowerCase().indexOf(nameSearch)===-1)return false;
    if(stateSearch&&(c.state||"").toLowerCase().indexOf(stateSearch)===-1)return false;
    return true;
  });

  filtered.sort(function(a,b){
    if(sortBy==="quality")return(b.quality||0)-(a.quality||0);

    // Last visit
    html+='<td style="text-align:center;padding:8px;font-size:11px;color:#1A1A2E">'+(c.last_visit_date||"\u2013")+'</td>';
    // Status
    var stColor=c.status==="handled"?"#0960BB":c.status==="new"?"#2E7D32":"#8A9099";
    var stBg=c.status==="handled"?"#0960BB14":c.status==="new"?"#2E7D3214":"#F5F7FA";
    html+='<td style="text-align:center;padding:8px"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:'+stBg+';color:'+stColor+'">'+(c.status||"\u2013")+'</span></td>';
    // Pages expand button
    html+='<td style="text-align:center;padding:8px"><button onclick="toggleCompanyPages(\''+c.id+'\',\''+pagesId+'\')" style="padding:3px 8px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:10px;cursor:pointer;color:#0960BB;font-weight:600">\u25BC</button></td>';
    html+='</tr>';

    html+='<tr id="'+pagesId+'" style="display:none"><td colspan="8" style="padding:0 8px 12px 48px;background:#F8F9FC"><div id="'+pagesId+'-content" style="padding:8px 0;font-size:11px;color:#8A9099">Loading pages...</div></td></tr>';

  var bankCount=filtered.filter(function(c){var ind=(c.industry||"").toLowerCase();return ind.indexOf("bank")>-1||ind.indexOf("financial")>-1||ind.indexOf("credit")>-1}).length;
  var newCount=filtered.filter(function(c){return startDate&&c.first_visit_date>=startDate}).length;
  var highQuality=filtered.filter(function(c){return c.quality>=8}).length;

  var ihtml='<div class="insights"><h3>Company Insights</h3><div>';
  ihtml+='<div><strong>Total:</strong> '+filtered.length+' companies identified ('+companiesData.length+' total before filters).</div>';
  ihtml+='<div><strong>Banking & Financial:</strong> '+bankCount+' financial institutions visiting your site.</div>';
  ihtml+='<div><strong>New This Period:</strong> '+newCount+' companies visiting for the first time.</div>';
  if(highQuality>0)ihtml+='<div><strong>High Quality:</strong> '+highQuality+' companies scored 8+ by Leadfeeder \u2014 strong engagement signals.</div>';
  ihtml+='</div></div>';
  document.getElementById("co-insights").innerHTML=ihtml;

var companyPagesCache={};

async function toggleCompanyPages(leadId,rowId){
  var row=document.getElementById(rowId);
  if(!row)return;

  // Toggle visibility
  if(row.style.display!=="none"){
    row.style.display="none";
    return;
  }
  row.style.display="";

  var contentEl=document.getElementById(rowId+"-content");
  if(!contentEl)return;

  // Check cache
  if(companyPagesCache[leadId]){
    renderCompanyPages(contentEl,companyPagesCache[leadId]);
    return;
  }

  contentEl.innerHTML='<span style="color:#8A9099">Loading visited pages...</span>';

  try{
    var fromEl=document.getElementById("date-from");
    var toEl=document.getElementById("date-to");
    var startDate=fromEl&&fromEl.value?fromEl.value:defaultDateStr(-6);
    var endDate=toEl&&toEl.value?toEl.value:defaultDateStr(0);

    var resp=await fetch(LF_URL+"/leads/"+leadId+"/visits?start_date="+startDate+"&end_date="+endDate);
    var result=await resp.json();

    if(result.error){
      contentEl.innerHTML='<span style="color:#E53935">Error: '+result.error+'</span>';
      return;
    }

    companyPagesCache[leadId]=result.data||[];
    renderCompanyPages(contentEl,result.data||[]);
  }catch(err){
    contentEl.innerHTML='<span style="color:#E53935">Failed to load: '+err.message+'</span>';
  }
}

function renderCompanyPages(el,visits){
  if(!visits||visits.length===0){
    el.innerHTML='<span style="color:#8A9099">No visit details available for this period.</span>';
    return;
  }

  var html='<div style="margin-bottom:4px;font-size:10px;font-weight:600;color:#002D72;text-transform:uppercase;letter-spacing:.5px">'+visits.length+' Visit'+(visits.length>1?"s":"")+'</div>';

  visits.forEach(function(v,vi){
    var route=v.visit_route||[];
    var timeStr=v.date+(v.hour!=null?" at "+String(v.hour).padStart(2,"0")+":00":"");
    var lengthStr=v.visit_length>0?Math.floor(v.visit_length/60)+"m "+( v.visit_length%60)+"s":"< 1s";
    var srcStr=(v.source||"direct")+(v.medium?" / "+v.medium:"");

    html+='<div style="padding:8px 0;'+(vi<visits.length-1?"border-bottom:1px solid #E8ECF0;":"")+'">';
    html+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px">';
    html+='<span style="font-size:11px;font-weight:600;color:#1A1A2E">'+timeStr+'</span>';
    html+='<span style="font-size:10px;color:#8A9099">'+lengthStr+' \u00b7 '+route.length+' page'+(route.length!==1?"s":"")+'</span>';
    html+='<span style="font-size:10px;color:#8A9099">via '+srcStr+'</span>';
    if(v.device_type)html+='<span style="font-size:10px;color:#8A9099">\u00b7 '+v.device_type+'</span>';
    html+='</div>';

    if(route.length>0){
      html+='<div style="margin-left:8px;border-left:2px solid #E8ECF0;padding-left:10px">';
      route.forEach(function(p,pi){
        var topStr=p.time_on_page>0?Math.floor(p.time_on_page/60)+"m "+(p.time_on_page%60)+"s":"< 1s";
        html+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0">';
        html+='<span style="width:6px;height:6px;border-radius:50%;background:'+(pi===0?"#0960BB":"#D0D5DD")+';flex-shrink:0"></span>';
        html+='<span style="font-size:11px;color:#1A1A2E;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(p.page_title||p.page_path)+'</span>';
        html+='<span style="font-size:10px;color:#8A9099;flex-shrink:0">'+topStr+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });

  el.innerHTML=html;
}

// ── MAP ──
var mapStateData=null;
var mapCurrentView="us"; // "us", "state", "city"
var mapCurrentState="";
var mapCurrentCity="";

var US_STATES={
  "AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Florida","GA":"Georgia","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire","NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming","DC":"District of Columbia"
};

var STATE_NAMES={};
Object.keys(US_STATES).forEach(function(k){STATE_NAMES[US_STATES[k].toLowerCase()]=k;STATE_NAMES[k.toLowerCase()]=k;});

function resolveStateCode(c){
  if(!c.state&&!c.state_code)return"";
  if(c.state_code&&c.state_code.length===2)return c.state_code.toUpperCase();
  var s=(c.state||"").toLowerCase().trim();
  if(STATE_NAMES[s])return STATE_NAMES[s];
  // Try matching partial
  var keys=Object.keys(US_STATES);
  for(var i=0;i<keys.length;i++){if(US_STATES[keys[i]].toLowerCase().indexOf(s)>-1)return keys[i];}
  return"";
}

async function fetchMapData(){
  var status=document.getElementById("map-status");
  if(companiesData){
    buildMapStateData();
    return;
  }
  if(status)status.textContent="Loading companies for map...";
  await fetchCompanies();
  buildMapStateData();
}

function buildMapStateData(){
  var status=document.getElementById("map-status");
  if(!companiesData){if(status)status.innerHTML='<span style="color:#E53935">No company data loaded.</span>';return;}

  mapStateData={};
  var unmapped=0;
  companiesData.forEach(function(c){
    // Only banking/financial
    var ind=(c.industry||"").toLowerCase();
    if(!(ind.indexOf("bank")>-1||ind.indexOf("financial")>-1||ind.indexOf("credit")>-1||ind.indexOf("investment")>-1))return;
    // Skip internal
    if(INTERNAL_NAMES.some(function(n){return c.name.indexOf(n)>-1}))return;
    var sc=resolveStateCode(c);
    if(!sc||!US_STATES[sc]){unmapped++;return;}
    if(!mapStateData[sc])mapStateData[sc]={code:sc,name:US_STATES[sc],companies:[],cities:{}};
    mapStateData[sc].companies.push(c);
    var city=c.city||"Unknown";
    if(!mapStateData[sc].cities[city])mapStateData[sc].cities[city]=[];
    mapStateData[sc].cities[city].push(c);
  });

  var stateCount=Object.keys(mapStateData).length;
  var totalCos=Object.keys(mapStateData).reduce(function(s,k){return s+mapStateData[k].companies.length},0);
  if(status)status.innerHTML='<span style="color:#2E7D32">'+totalCos+' banking companies across '+stateCount+' states.'+(unmapped>0?' ('+unmapped+' without location data)':'')+'</span>';

  mapCurrentView="us";
  renderUSMap();
}

function renderUSMap(){
  var container=document.getElementById("map-container");
  var backBtn=document.getElementById("map-back-btn");
  var breadcrumb=document.getElementById("map-breadcrumb");
  if(!container||!mapStateData)return;

  if(backBtn)backBtn.style.display=mapCurrentView==="us"?"none":"";

  if(mapCurrentView==="us"){
    if(breadcrumb)breadcrumb.innerHTML='<span class="chart-title" style="margin-bottom:0">Bank Visitor Map \u2014 United States</span>';
    renderStateList(container);
  }else if(mapCurrentView==="state"){
    if(breadcrumb)breadcrumb.innerHTML='<span class="chart-title" style="margin-bottom:0">Bank Visitor Map \u2014 '+US_STATES[mapCurrentState]+'</span>';
    renderCityList(container,mapCurrentState);
  }else if(mapCurrentView==="city"){
    if(breadcrumb)breadcrumb.innerHTML='<span class="chart-title" style="margin-bottom:0">Bank Visitor Map \u2014 '+US_STATES[mapCurrentState]+' \u203a '+mapCurrentCity+'</span>';
    renderCityCompanies(container,mapCurrentState,mapCurrentCity);
  }
}

function renderStateList(container){
  var states=Object.keys(mapStateData).sort(function(a,b){return mapStateData[b].companies.length-mapStateData[a].companies.length});
  var maxCos=states.length>0?mapStateData[states[0]].companies.length:1;

  var html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">';
  states.forEach(function(sc){
    var sd=mapStateData[sc];
    var pct=Math.round((sd.companies.length/maxCos)*100);
    var heat=sd.companies.length>=5?"#002D72":sd.companies.length>=3?"#0960BB":sd.companies.length>=2?"#4A90D9":"#A3C4E9";
    html+='<div onclick="mapDrillState(\''+sc+'\')" style="cursor:pointer;padding:12px;border-radius:10px;border:1px solid #E8ECF0;background:#fff;transition:all .15s" onmouseover="this.style.borderColor=\'#0960BB\';this.style.boxShadow=\'0 2px 8px rgba(9,96,187,.12)\'" onmouseout="this.style.borderColor=\'#E8ECF0\';this.style.boxShadow=\'none\'">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<span style="font-size:14px;font-weight:700;color:#002D72">'+sc+'</span>';
    html+='<span style="font-size:20px;font-weight:800;color:'+heat+'">'+sd.companies.length+'</span>';
    html+='</div>';
    html+='<div style="font-size:10px;color:#8A9099;margin-bottom:6px">'+sd.name+'</div>';
    html+='<div style="height:4px;background:#F0F2F5;border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+heat+';border-radius:2px"></div></div>';
    var cityCount=Object.keys(sd.cities).length;
    html+='<div style="font-size:9px;color:#8A9099;margin-top:4px">'+cityCount+' cit'+(cityCount===1?'y':'ies')+'</div>';
    html+='</div>';
  });
  html+='</div>';

  if(states.length===0)html='<div style="text-align:center;padding:40px;color:#8A9099;font-size:12px">No banking companies with location data. Update the Leadfeeder Worker to v1.1 to capture location.</div>';

  container.innerHTML=html;
  document.getElementById("map-detail").innerHTML="";
}

function mapDrillState(sc){
  mapCurrentState=sc;
  mapCurrentView="state";
  renderUSMap();
}

function renderCityList(container,sc){
  var sd=mapStateData[sc];
  if(!sd){container.innerHTML="No data.";return;}

async function fetchHistorical(){
  var fromEl=document.getElementById("date-from");
  var toEl=document.getElementById("date-to");
  var btn=document.getElementById("hist-fetch-btn");
  var status=document.getElementById("hist-status");

  if(!fromEl.value||!toEl.value){
    status.innerHTML='<span style="color:#E53935">Select date range in the header first.</span>';
    return;
  }

  var from=new Date(fromEl.value+"T12:00:00");
  var to=new Date(toEl.value+"T12:00:00");
  if(from>to){status.innerHTML='<span style="color:#E53935">Invalid date range.</span>';return;}

  function fmtD(dt){var y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,"0"),d=String(dt.getDate()).padStart(2,"0");return y+"-"+m+"-"+d;}

  var days=[];
  var d=new Date(from);
  while(d<=to){days.push(fmtD(d));d.setDate(d.getDate()+1);}

  if(days.length>60){
    status.innerHTML='<span style="color:#E53935">Max 60 days for daily data. Narrow the date range.</span>';
    return;
  }

  var origText=btn.innerHTML;
  btn.innerHTML="Loading...";btn.style.opacity=".6";btn.style.pointerEvents="none";
  status.textContent="Fetching "+days.length+" days...";

  // Helper to fetch a range of days
  async function fetchDays(dayList,statusPrefix){
    var result=[];
    for(var i=0;i<dayList.length;i++){
      var dateStr=dayList[i].replace(/-/g,"");
      status.textContent=statusPrefix+" day "+(i+1)+" of "+dayList.length+"...";
      var resp=await fetch(WORKER_URL+"?period="+dateStr+"&page_size=1000");
      var data=await resp.json();
      var dayEvents=data.data||[];
      var dayObj={date:dayList[i],_titles:{}};

      dayEvents.forEach(function(e){
        if(!dayObj[e.action])dayObj[e.action]=0;
        dayObj[e.action]+=e.events;
        if(["Blog","Page","Podcast"].indexOf(e.action)>-1 && e.label.indexOf(": ")>-1){
          var title=e.label.split(": ").slice(1).join(": ");
          var key=e.action+": "+title;
          if(!dayObj._titles[key])dayObj._titles[key]=0;
          dayObj._titles[key]+=e.events;
        }
        if(e.action==="Click"){
          var clk="click_other";
          if(e.label==="Mystuff")clk="click_mystuff";
          else if(e.label==="Signup")clk="click_signup";
          else if(e.label==="Blog")clk="click_blog";
          else if(e.label==="Podcast")clk="click_podcast";
          else if(e.label==="Events")clk="click_events";
          else if(e.label.indexOf("Discover")===0)clk="click_discover";
          else if(e.label.indexOf("Recent")===0)clk="click_recent";
          else if(e.label.indexOf("Saved")===0)clk="click_saved";
          if(!dayObj[clk])dayObj[clk]=0;
          dayObj[clk]+=e.events;
        }
        if(e.action==="Share"){var sk="share_"+e.label;if(!dayObj[sk])dayObj[sk]=0;dayObj[sk]+=e.events;}
        if(e.action==="Save"){var svk="save_"+e.label;if(!dayObj[svk])dayObj[svk]=0;dayObj[svk]+=e.events;}
      });

      result.push(dayObj);
    }
    return result;
  }

  try{
    // Fetch current period
    var dailyData=await fetchDays(days,"Current period:");
    histData=dailyData;

    // Fetch prior period (same length, immediately before)
    var periodLen=days.length;
    var prevEnd=new Date(from);
    prevEnd.setDate(prevEnd.getDate()-1);
    var prevStart=new Date(prevEnd);
    prevStart.setDate(prevStart.getDate()-periodLen+1);
    var prevDays=[];
    var pd=new Date(prevStart);
    while(pd<=prevEnd){prevDays.push(fmtD(pd));pd.setDate(pd.getDate()+1);}

    status.textContent="Fetching prior period for comparison...";
    histPrevData=await fetchDays(prevDays,"Prior period:");

    // Build top content list from aggregated data
    var titleTotals={};
    histData.forEach(function(d){
      Object.keys(d._titles).forEach(function(k){
        if(!titleTotals[k])titleTotals[k]=0;
        titleTotals[k]+=d._titles[k];
      });
    });
    histTopContent=Object.keys(titleTotals).sort(function(a,b){return titleTotals[b]-titleTotals[a]}).slice(0,10);

    status.innerHTML='<span style="color:#2E7D32">'+days.length+' days loaded (+ '+prevDays.length+' day prior period).</span>';
    rebuildHistSelectors();
    renderHistoricalCharts();
    renderLeaderboard();

  }catch(err){
    status.innerHTML='<span style="color:#E53935">Fetch failed: '+err.message+'</span>';
  }

  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

function renderHistoricalCharts(){
  if(!histData||!histData.length)return;

  // Get selected metrics from checkboxes
  var selectedMetrics=[];
  document.querySelectorAll(".hist-metric-cb:checked").forEach(function(cb){
    selectedMetrics.push(cb.dataset.metric);
  });
  // Add extra content lines
  extraTrafficLines.forEach(function(k){
    if(selectedMetrics.indexOf(k)===-1)selectedMetrics.push(k);
  });
  if(selectedMetrics.length<1)selectedMetrics=["Impression"];

  var labels=histData.map(function(d){
    var p=d.date.split("-");
    return parseInt(p[1])+"/"+parseInt(p[2]);
  });

  // Destroy old charts
  if(charts.histTraffic)charts.histTraffic.destroy();
  if(charts.histWidget)charts.histWidget.destroy();
  if(charts.histDetail)charts.histDetail.destroy();

  // Helper: get value for a metric key from a day object
  function getVal(d,key){
    if(d._titles && d._titles[key]!==undefined)return d._titles[key];
    return d[key]||0;
  }

  var dispLabel={"Impression":"Page Visits","Daily Visit":"Daily Visitors"};
  function dLabel(k){var l=dispLabel[k]||k;return l.length>35?l.slice(0,34)+"\u2026":l;}

  var trafficColors=["#0960BB","#FFBF3F","#2E7D32","#7C3AED","#E53935","#D97706","#0891B2","#8B5CF6"];

  // Build datasets for selected metrics
  var datasets=selectedMetrics.map(function(key,i){
    return{
      label:dLabel(key),
      data:histData.map(function(d){return getVal(d,key)}),
      borderColor:trafficColors[i%trafficColors.length],
      backgroundColor:trafficColors[i%trafficColors.length]+"15",
      fill:i<2,
      tension:0.3,
      pointRadius:3,
      pointHoverRadius:5,
      borderWidth:2
    };
  });

  charts.histTraffic=new Chart(document.getElementById("c-hist-traffic"),{
    type:"line",
    data:{labels:labels,datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:10}}},scales:{y:{beginAtZero:true,grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099"}},x:{grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099",maxRotation:45}}},interaction:{mode:"index",intersect:false}}
  });

  // Insights based on primary selected metric
  var pm=selectedMetrics[0];
  var pmLabel=dLabel(pm);
  var totalPM=histData.reduce(function(s,d){return s+getVal(d,pm)},0);
  var peakDay=histData.reduce(function(best,d){return getVal(d,pm)>getVal(best,pm)?d:best},histData[0]);
  var avgPM=(totalPM/histData.length).toFixed(1);

  var ihtml='<div class="insights"><h3>Trend Analysis</h3><div>';
  ihtml+='<div><strong>'+pmLabel+':</strong> '+totalPM+' total over '+histData.length+' days (avg '+avgPM+'/day). Peak: '+peakDay.date+' with '+getVal(peakDay,pm)+'.</div>';

  // Show totals for other selected metrics
  selectedMetrics.slice(1).forEach(function(key){
    var t=histData.reduce(function(s,d){return s+getVal(d,key)},0);
    var a=(t/histData.length).toFixed(1);
    ihtml+='<div><strong>'+dLabel(key)+':</strong> '+t+' total (avg '+a+'/day).</div>';
  });

  if(histData.length>=3){
    var firstHalf=histData.slice(0,Math.floor(histData.length/2));
    var secondHalf=histData.slice(Math.floor(histData.length/2));
    var avg1=firstHalf.reduce(function(s,d){return s+getVal(d,pm)},0)/firstHalf.length;
    var avg2=secondHalf.reduce(function(s,d){return s+getVal(d,pm)},0)/secondHalf.length;
    var trendPct=avg1>0?((avg2-avg1)/avg1*100).toFixed(0):0;
    var trendDir=trendPct>5?"trending up \u2191":trendPct<-5?"trending down \u2193":"holding steady \u2192";
    ihtml+='<div><strong>Direction:</strong> '+pmLabel+' is '+trendDir+' ('+trendPct+'% change, first half vs second half).</div>';
  }

  ihtml+='</div></div>';
  // CommandBar Pip Interactions chart
  var widgetMetrics=[
    {key:"Open",label:"Rail Opens",color:CL.navy},
    {key:"Share",label:"Shares",color:CL.green},
    {key:"Save",label:"Saves",color:CL.gold},
    {key:"Nudge",label:"Nudges",color:CL.red},
    {key:"Nudge Dismiss",label:"Nudge Dismisses",color:"#8A9099"},
    {key:"Click",label:"Nav Clicks",color:CL.blue}
  ];
  charts.histWidget=new Chart(document.getElementById("c-hist-widget"),{
    type:"line",
    data:{
      labels:labels,
      datasets:widgetMetrics.map(function(m){
        return{label:m.label,data:histData.map(function(d){return d[m.key]||0}),borderColor:m.color,backgroundColor:m.color+"10",fill:false,tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:2};
      })
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:10}}},scales:{y:{beginAtZero:true,grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099"}},x:{grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099",maxRotation:45}}},interaction:{mode:"index",intersect:false}}
  });

  // CommandBar Rail Interactions chart
  var detailMetrics=[
    {key:"click_mystuff",label:"My Stuff",color:CL.navy},
    {key:"click_signup",label:"Signup",color:CL.blue},
    {key:"click_blog",label:"Blog Nav",color:"#D97706"},
    {key:"click_podcast",label:"Podcast Nav",color:"#7C3AED"},
    {key:"click_events",label:"Events Nav",color:"#059669"},
    {key:"click_discover",label:"Discover",color:"#0891B2"},
    {key:"click_recent",label:"Recent Nav",color:"#6B7280"},
    {key:"click_saved",label:"Saved Nav",color:"#8B5CF6"}
  ];
  var activeDetail=detailMetrics.filter(function(m){
    return histData.some(function(d){return(d[m.key]||0)>0});
  });
  if(activeDetail.length>0){
    charts.histDetail=new Chart(document.getElementById("c-hist-detail"),{
      type:"line",
      data:{
        labels:labels,
        datasets:activeDetail.map(function(m){
          return{label:m.label,data:histData.map(function(d){return d[m.key]||0}),borderColor:m.color,backgroundColor:m.color+"10",fill:false,tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:2};
        })
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:8}}},scales:{y:{beginAtZero:true,grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099",stepSize:1}},x:{grid:{color:"#F0F2F5"},ticks:{font:{size:11},color:"#8A9099",maxRotation:45}}},interaction:{mode:"index",intersect:false}}
    });
  }

  // Insights based on primary selected metric
  document.getElementById("hist-insights").innerHTML=ihtml;
}

function renderLeaderboard(){
  var el=document.getElementById("leaderboard-inner");
  if(!el||!histData||!histData.length)return;

  // Aggregate current period
  var titleTotals={};
  var titleDaily={};
  histData.forEach(function(day){
    if(!day._titles)return;
    Object.keys(day._titles).forEach(function(key){
      if(!titleTotals[key])titleTotals[key]=0;
      titleTotals[key]+=day._titles[key];
      if(!titleDaily[key])titleDaily[key]=[];
    });
  });
  Object.keys(titleDaily).forEach(function(key){
    histData.forEach(function(day){
      titleDaily[key].push(day._titles&&day._titles[key]?day._titles[key]:0);
    });
  });

  // Aggregate prior period
  var prevTotals={};
  var prevDaily={};
  if(histPrevData&&histPrevData.length){
    histPrevData.forEach(function(day){
      if(!day._titles)return;
      Object.keys(day._titles).forEach(function(key){
        if(!prevTotals[key])prevTotals[key]=0;
        prevTotals[key]+=day._titles[key];
        if(!prevDaily[key])prevDaily[key]=[];
      });
    });
    Object.keys(prevDaily).forEach(function(key){
      histPrevData.forEach(function(day){
        prevDaily[key].push(day._titles&&day._titles[key]?day._titles[key]:0);
      });
    });
  }

  var sorted=Object.keys(titleTotals).sort(function(a,b){return titleTotals[b]-titleTotals[a]}).slice(0,15);
  if(sorted.length===0){el.innerHTML='';return;}

  var maxTotal=titleTotals[sorted[0]]||1;
  var hasPrev=histPrevData&&histPrevData.length>0;

  var html='<div class="chart-card" style="flex:1 1 100%;margin-bottom:16px">';
  html+='<div class="chart-title">Content Leaderboard</div>';
  html+='<div style="font-size:11px;color:#8A9099;margin:-6px 0 8px">Top content by total events'+(hasPrev?' \u2014 colored bars = current, <span style="color:#D0D5DD">\u2588</span> grey = prior period':'')+'</div>';

  sorted.forEach(function(key,idx){
    var total=titleTotals[key];
    var daily=titleDaily[key]||[];
    var prevTotal=prevTotals[key]||0;
    var prev=prevDaily[key]||[];
    var barPct=Math.round((total/maxTotal)*100);

    var type=key.split(": ")[0];
    var title=key.split(": ").slice(1).join(": ");
    var typeColor=type==="Blog"?"#0960BB":type==="Podcast"?"#B48A00":"#8A9099";
    var typeBg=type==="Blog"?"#0960BB14":type==="Podcast"?"#FFBF3F14":"#8A909914";

    // Change vs prior period
    var changePct=prevTotal>0?Math.round((total-prevTotal)/prevTotal*100):total>0?100:0;
    var changeArrow=changePct>0?"\u2191"+changePct+"%":changePct<0?"\u2193"+Math.abs(changePct)+"%":"\u2192";
    var changeColor=changePct>0?"#2E7D32":changePct<0?"#E53935":"#8A9099";

    // Dual mini bar chart SVG
    var sparkW=130;
    var sparkH=30;
    var allVals=daily.concat(prev);
    var maxDay=Math.max.apply(null,allVals.length>0?allVals:[0])||1;
    var numDays=Math.max(daily.length,prev.length,1);
    var barGap=1;
    var groupW=(sparkW-barGap*(numDays-1))/numDays;
    var barW=prev.length>0?groupW/2-0.5:groupW;

    html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;'+(idx<sorted.length-1?'border-bottom:1px solid #F0F2F5;':'')+'">';

    // Rank
    html+='<div style="width:22px;font-size:11px;font-weight:700;color:'+(idx<3?"#002D72":"#8A9099")+';text-align:center;flex-shrink:0">'+(idx+1)+'</div>';

    // Title + type
    html+='<div style="flex:1;min-width:0;overflow:hidden">';
    html+='<div style="font-size:12px;font-weight:500;color:#1A1A2E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</div>';
    html+='<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:6px;background:'+typeBg+';color:'+typeColor+'">'+type+'</span>';
    html+='</div>';

    // Mini bar chart
    var sparkColor=changePct>0?"#2E7D32":changePct<0?"#C62828":"#455A64";
    html+='<div style="flex-shrink:0;width:'+sparkW+'px">';
    html+='<svg width="'+sparkW+'" height="'+sparkH+'" viewBox="0 0 '+sparkW+' '+sparkH+'">';
    for(var di=0;di<numDays;di++){
      var x=di*(groupW+barGap);
      // Prior period bar (grey)
      if(prev.length>0&&di<prev.length){
        var ph=prev[di]>0?Math.max(2,(prev[di]/maxDay)*(sparkH-2)):0;
        if(ph>0)html+='<rect x="'+x.toFixed(1)+'" y="'+(sparkH-ph).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+ph.toFixed(1)+'" rx="1" fill="#D0D5DD"/>';
      }
      // Current period bar (colored)
      var cx=prev.length>0?x+barW+1:x;
      if(di<daily.length){
        var ch=daily[di]>0?Math.max(2,(daily[di]/maxDay)*(sparkH-2)):0;
        if(ch>0)html+='<rect x="'+cx.toFixed(1)+'" y="'+(sparkH-ch).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+ch.toFixed(1)+'" rx="1" fill="'+sparkColor+'"/>';
      }
    }
    html+='</svg></div>';

    // Total + change
    html+='<div style="flex-shrink:0;text-align:right;width:65px">';
    html+='<div style="font-size:14px;font-weight:700;color:#002D72">'+total+'</div>';
    html+='<div style="font-size:10px;color:'+changeColor+';font-weight:600">'+changeArrow+'</div>';
    if(hasPrev&&prevTotal>0)html+='<div style="font-size:9px;color:#8A9099">was '+prevTotal+'</div>';
    html+='</div>';

    // Bar
    html+='<div style="flex-shrink:0;width:80px;height:6px;background:#F5F7FA;border-radius:3px;overflow:hidden">';
    html+='<div style="height:100%;width:'+barPct+'%;background:#0960BB;border-radius:3px"></div>';
    html+='</div>';

    html+='</div>';
  });

  html+='</div>';
  el.innerHTML=html;
}

// ── API FETCH ──
const WORKER_URL = "https://siteimprove-proxy.jameswspence.workers.dev";

async function fetchAPI(){
  const fromEl=document.getElementById("date-from");
  const toEl=document.getElementById("date-to");
  const btn=document.getElementById("fetch-btn");

  if(!fromEl.value||!toEl.value){
    document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>Select both start and end dates.</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
    return;
  }

  const from=fromEl.value.replace(/-/g,"");
  const to=toEl.value.replace(/-/g,"");
  if(from>to){
    document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>Start date must be before end date.</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
    return;
  }

  const origText=btn.innerHTML;
  btn.innerHTML="Fetching...";btn.style.opacity=".6";btn.style.pointerEvents="none";
  document.getElementById("import-msg").innerHTML="";

  try{
    const url=WORKER_URL+"?period="+from+"_"+to+"&page_size=1000";
    const resp=await fetch(url);
    if(!resp.ok){
      const err=await resp.text();
      throw new Error("API returned "+resp.status+": "+err);
    }
    const result=await resp.json();

    if(result.error){
      throw new Error(result.error+(result.detail?" — "+result.detail:""));
    }

    if(!result.data||result.data.length===0){
      document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>No CommandBar events found for this date range.</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
      btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
      return;
    }

    RAW_DATA=result.data;
    // Format period for display
    const fd=fromEl.value,td=toEl.value;
    const fmtDate=function(d){var p=d.split("-");var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return m[parseInt(p[1],10)-1]+" "+parseInt(p[2],10)+", "+p[0]};
    PERIOD=fmtDate(fd)+(fd===td?"":" \u2013 "+fmtDate(td));
    hasData=true;

    document.getElementById("import-msg").innerHTML='<div class="import-msg success"><span>'+result.data.length+' events loaded via API for '+PERIOD+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
    render();

  }catch(err){
    console.error("API fetch error:",err);
    document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>Fetch failed: '+err.message+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
  }

  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

// Set default date range (last 7 days)
(function(){
  var today=new Date();
  var week=new Date(today);week.setDate(week.getDate()-6);
  var fmt=function(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;};
  document.getElementById("date-from").value=fmt(week);
  document.getElementById("date-to").value=fmt(today);
})();

document.getElementById("csv-input").addEventListener("change",function(e){
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(evt){
    try{
      const result=parseCSV(evt.target.result);
      if(result.data.length===0){
        document.getElementById("import-msg").innerHTML=`<div class="import-msg error"><span>No CommandBar events found.</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>`;
        return;
      }
      RAW_DATA=result.data;
      if(result.period)PERIOD=result.period;
      hasData=true;
      document.getElementById("import-msg").innerHTML=`<div class="import-msg success"><span>${result.data.length} events loaded from ${file.name}</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>`;
      render();
    }catch(err){
      document.getElementById("import-msg").innerHTML=`<div class="import-msg error"><span>Parse error: ${err.message}</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>`;
    }
  };
  reader.readAsText(file,"utf-16");
  this.value="";
});

// ── EXPORT PDF ──
async function exportPDF(){
  const btn=document.getElementById("export-btn");
  const origText=btn.innerHTML;
  btn.innerHTML="Generating...";btn.style.opacity=".6";btn.style.pointerEvents="none";

  try{
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF("l","mm","a4");
    const pw=pdf.internal.pageSize.getWidth();
    const ph=pdf.internal.pageSize.getHeight();
    const margin=12;
    const contentW=pw-margin*2;
    const headerH=27;
    const footerH=8;
    const availH=ph-headerH-footerH;
    let pageCount=0;

    function drawHeader(title,contd){
      pdf.setFillColor(0,45,114);
      pdf.rect(0,0,pw,18,"F");
      pdf.setFont("helvetica","bold");pdf.setFontSize(14);pdf.setTextColor(255,255,255);
      pdf.text("CommandBar Analytics v2.1",margin,12);
      pdf.setFont("helvetica","normal");pdf.setFontSize(9);
      pdf.text((PERIOD?PERIOD+" \u00b7 ":"")+"SouthState Correspondent",pw-margin,12,{align:"right"});
      pdf.setFillColor(9,96,187);
      pdf.rect(0,18,pw,6,"F");
      pdf.setFont("helvetica","bold");pdf.setFontSize(8);pdf.setTextColor(255,255,255);
      pdf.text(title.toUpperCase()+(contd?" (CONTINUED)":""),margin,22.5);
      pdf.setTextColor(0,0,0);
    }
    function drawFooter(n){
      pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(138,144,153);
      pdf.text("CommandBar Analytics Dashboard v2.1 \u00b7 SiteImprove Events",margin,ph-5);
      pdf.text("Page "+n,pw-margin,ph-5,{align:"right"});
    }

    function addPage(title,contd){
      if(pageCount>0)pdf.addPage();
      pageCount++;
      drawHeader(title,contd||false);
      drawFooter(pageCount);
    }

    // Capture a DOM element as image and add to PDF (single page, scale to fit)
    async function captureAndAdd(el,tabName){
      const canvas=await html2canvas(el,{scale:2,backgroundColor:"#F5F7FA",useCORS:true,logging:false,windowWidth:980});
      const imgData=canvas.toDataURL("image/jpeg",0.92);
      const imgW=contentW;
      const imgH=(canvas.height/canvas.width)*contentW;
      const finalH=Math.min(imgH,availH);
      const finalW=imgH>availH?(availH/imgH)*imgW:imgW;
      const xOff=margin+(contentW-finalW)/2;
      addPage(tabName);
      pdf.addImage(imgData,"JPEG",xOff,headerH,finalW,finalH);
    }

    // Draw native content table (top 15)
    function drawContentTable(){
      addPage("Content",true);
      const d=process(RAW_DATA);
      const sortedArticles=[...d.articles].sort((a,b)=>{
        const f=contentSortField,dir=contentSortDir;
        if(f==="title"||f==="type"){const av=(a[f]||"").toLowerCase(),bv=(b[f]||"").toLowerCase();return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);}
        return dir==="asc"?(a[f]||0)-(b[f]||0):(b[f]||0)-(a[f]||0);
      });
      const rows=sortedArticles.slice(0,15);
      const rowH=7;
      const headH=8;

      // Column layout
      const cols=[
        {label:"TITLE",w:contentW*0.42,a:"left"},
        {label:"TYPE",w:contentW*0.08,a:"center"},
        {label:"ENGAGED",w:contentW*0.10,a:"center"},
        {label:"SKIM",w:contentW*0.10,a:"center"},
        {label:"BOUNCE",w:contentW*0.10,a:"center"},
        {label:"TOTAL",w:contentW*0.10,a:"center"},
        {label:"SIGNAL",w:contentW*0.10,a:"center"},
      ];

      let y=headerH+2;

      // Table title
      pdf.setFont("helvetica","bold");pdf.setFontSize(10);pdf.setTextColor(0,45,114);
      pdf.text("Top "+rows.length+" Content by Performance",margin,y+4);
      y+=10;

      // Header row
      pdf.setFillColor(0,45,114);
      pdf.rect(margin,y,contentW,headH,"F");
      pdf.setFont("helvetica","bold");pdf.setFontSize(7.5);pdf.setTextColor(255,255,255);
      let x=margin;
      cols.forEach(c=>{
        const tx=c.a==="left"?x+3:x+c.w/2;
        pdf.text(c.label,tx,y+5.5,{align:c.a==="left"?"left":"center"});
        x+=c.w;
      });
      y+=headH;

      // Data rows
      rows.forEach((a,idx)=>{
        // Zebra
        if(idx%2===0){pdf.setFillColor(248,249,252);pdf.rect(margin,y,contentW,rowH,"F");}

        x=margin;

        // Title
        pdf.setFont("helvetica","normal");pdf.setFontSize(8);pdf.setTextColor(26,26,46);
        const t=a.title.length>60?a.title.slice(0,59)+"\u2026":a.title;
        pdf.text(t,x+3,y+4.8);
        x+=cols[0].w;

        // Type
        const tc=a.type==="Blog"?[9,96,187]:a.type==="Podcast"?[180,140,20]:[138,144,153];
        pdf.setFont("helvetica","bold");pdf.setFontSize(7.5);pdf.setTextColor(tc[0],tc[1],tc[2]);
        pdf.text(a.type,x+cols[1].w/2,y+4.8,{align:"center"});
        x+=cols[1].w;

        // Engaged
        pdf.setFont("helvetica","bold");pdf.setFontSize(8.5);
        if(a.engaged){pdf.setTextColor(9,96,187);pdf.text(String(a.engaged),x+cols[2].w/2,y+4.8,{align:"center"});}
        else{pdf.setTextColor(208,213,221);pdf.text("\u2013",x+cols[2].w/2,y+4.8,{align:"center"});}
        x+=cols[2].w;

        // Skim
        if(a.skim){pdf.setTextColor(212,160,23);pdf.text(String(a.skim),x+cols[3].w/2,y+4.8,{align:"center"});}
        else{pdf.setTextColor(208,213,221);pdf.text("\u2013",x+cols[3].w/2,y+4.8,{align:"center"});}
        x+=cols[3].w;

        // Bounce
        if(a.bounce){pdf.setTextColor(229,57,53);pdf.text(String(a.bounce),x+cols[4].w/2,y+4.8,{align:"center"});}
        else{pdf.setTextColor(208,213,221);pdf.text("\u2013",x+cols[4].w/2,y+4.8,{align:"center"});}
        x+=cols[4].w;

        // Total
        pdf.setFont("helvetica","bold");pdf.setTextColor(0,45,114);
        pdf.text(String(a.total),x+cols[5].w/2,y+4.8,{align:"center"});
        x+=cols[5].w;

        // Signal
        const sc=a.engPct>=50?[9,96,187]:a.engPct>0?[212,160,23]:[229,57,53];
        const sl=a.engPct>=50?"Strong":a.engPct>0?"Mixed":"Weak";
        pdf.setFontSize(7.5);pdf.setTextColor(sc[0],sc[1],sc[2]);
        pdf.text(sl,x+cols[6].w/2,y+4.8,{align:"center"});

        // Row line
        pdf.setDrawColor(232,236,240);pdf.setLineWidth(0.2);
        pdf.line(margin,y+rowH,margin+contentW,y+rowH);

        y+=rowH;
      });

      // Show count note if truncated
      if(sortedArticles.length>rows.length){
        y+=4;
        pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(138,144,153);
        pdf.text("Showing top "+rows.length+" of "+sortedArticles.length+" total articles. Full data available in the interactive dashboard.",margin,y);
      }
    }

    // ── Capture tabs ──
    const tabs=["overview","content","insights","engagement","historical","leaderboard","companies","map"];
    const tabNames=["Overview","Content","Performance","Activity","Compare","Trending","Companies","Map"];
    const savedTab=currentTab;

    for(let i=0;i<tabs.length;i++){
      tabs.forEach(t=>{
        const el=document.getElementById("tab-"+t);
        el.style.display=t===tabs[i]?"block":"none";
        el.classList.remove("hidden");
      });
      await new Promise(r=>setTimeout(r,600));

      if(tabs[i]==="content"){
        // Page 1: charts screenshot
        await captureAndAdd(document.getElementById("content-charts"),"Content");
        // Page 2: native table
        drawContentTable();
      }else{
        await captureAndAdd(document.getElementById("tab-"+tabs[i]),tabNames[i]);
      }
    }

    // Restore tabs
    tabs.forEach(t=>{
      const el=document.getElementById("tab-"+t);
      el.style.display="";
      el.classList.toggle("hidden",t!==savedTab);
    });

    pdf.save("CommandBar-Analytics"+(PERIOD?"-"+PERIOD.replace(/[^a-zA-Z0-9]+/g,"-"):"")+".pdf");

  }catch(err){
    console.error("PDF export error:",err);
    document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>PDF export failed: '+err.message+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
    ["overview","content","insights","engagement","historical","leaderboard","companies","map"].forEach(t=>{
      const el=document.getElementById("tab-"+t);el.style.display="";
      el.classList.toggle("hidden",t!==currentTab);
    });
  }

  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

if(new URLSearchParams(window.location.search).has("csv")){
  var csvBtn=document.getElementById("csv-btn");
  if(csvBtn)csvBtn.style.display="";
}
render();
</script>
