<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommandBar Analytics Dashboard v2.5.4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;color:#1A1A2E;padding:20px 16px}
.wrap{max-width:980px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:8px;background:#002D72;display:flex;align-items:center;justify-content:center}
.title{font-size:19px;font-weight:700;color:#002D72;letter-spacing:-.3px}
.subtitle{font-size:12px;color:#8A9099}
.import-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#002D72;color:#fff;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;border:none}
.import-btn:hover{opacity:.85}
.import-msg{margin:8px 0 4px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.import-msg.success{background:#2E7D3214;color:#2E7D32}
.import-msg.error{background:#E5393514;color:#E53935}
.import-msg .close{cursor:pointer;opacity:.6;font-size:16px}
.tabs{display:flex;gap:6px;margin:16px 0 18px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E8ECF0;background:#fff;color:#8A9099;letter-spacing:.2px;transition:all .15s}
.tab.active{border-color:#0960BB;background:#0960BB0D;color:#0960BB}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{flex:1 1 160px;padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.card-label{font-size:10px;font-weight:700;color:#8A9099;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.card-value{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card-sub{font-size:11px;color:#8A9099;margin-top:3px}
.charts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.chart-card{padding:16px 18px;border-radius:12px;background:#fff;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,45,114,.04)}
.chart-title{font-size:12px;font-weight:700;color:#002D72;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;overflow:hidden}
.insights{padding:16px 20px;border-radius:12px;background:#002D72;color:#fff;margin-bottom:16px}
.insights h3{font-size:13px;font-weight:700;margin-bottom:8px}
.insights div{font-size:12px;line-height:1.7;opacity:.88}
.insights strong{color:#FFBF3F}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-strong{background:#0960BB14;color:#0960BB}
.badge-mixed{background:#FFBF3F14;color:#FFBF3F}
.badge-weak{background:#E5393514;color:#E53935}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.top5-item{padding:5px 0}
.top5-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.top5-title{font-size:11px;color:#1A1A2E;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.top5-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.top5-count{font-size:11px;font-weight:700;color:#002D72}
.top5-bar{height:6px;background:#F5F7FA;border-radius:3px;overflow:hidden}
.top5-fill{height:100%;border-radius:3px;transition:width .4s ease}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:2px solid #E8ECF0}
th{padding:10px 8px;font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;user-select:none;transition:color .15s}
th:first-child{text-align:left}
th:hover{color:#002D72}
td{padding:8px 8px;text-align:center}
td:first-child{text-align:left;font-weight:500;max-width:300px}
td:first-child div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{border-bottom:1px solid #F0F2F5}
tbody tr:nth-child(even){background:#FAFBFC}
.type-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block}
.detail-item{padding:8px 0;border-bottom:1px solid #F0F2F5}
.detail-item:last-child{border-bottom:none}
.detail-row{display:flex;justify-content:space-between;align-items:center}
.detail-left{display:flex;align-items:center;gap:8px}
.detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.detail-label{font-size:12px;font-weight:600;color:#1A1A2E}
.detail-count{font-size:14px;font-weight:700}
.detail-sub{margin-left:16px;margin-top:4px;font-size:11px;color:#8A9099}
.funnel-step{margin-bottom:12px}
.funnel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.funnel-name{font-size:12px;font-weight:600;color:#1A1A2E}
.funnel-val{font-size:12px;color:#8A9099}
.funnel-drop{color:#E53935;margin-left:8px;font-size:11px}
.funnel-track{height:24px;background:#F5F7FA;border-radius:6px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:6px;min-width:2px}
.funnel-pct{position:absolute;left:8px;top:4px;font-size:11px;font-weight:600;color:#fff}
.nudge-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.nudge-row+.nudge-row{border-top:1px solid #F0F2F5}
.save-item{display:flex;align-items:center;gap:8px;padding:6px 0}
.save-item+.save-item{border-top:1px solid #F0F2F5}
.save-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-label{font-size:12px;flex:1}
.save-count{font-size:12px;font-weight:600;color:#002D72}
.footer{text-align:center;font-size:10px;color:#8A9099;padding:16px 0 12px;margin-top:8px}
.hidden{display:none}

/* ── Feed sidebar ── */
.feed-sidebar-wrap{display:flex;gap:0;overflow:hidden}
.feed-sidebar{width:160px;flex-shrink:0;border-right:1px solid #E8ECF0;display:flex;flex-direction:column;transition:width .2s ease,opacity .2s ease}
.feed-sidebar.collapsed{width:0;overflow:hidden;border-right:none;opacity:0;pointer-events:none}
.feed-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 6px;border-bottom:1px solid #E8ECF0;flex-shrink:0}
.feed-sidebar-label{font-size:9px;font-weight:700;color:#8A9099;letter-spacing:.7px;text-transform:uppercase}
.feed-sidebar-search{padding:6px 10px;border-bottom:1px solid #E8ECF0;flex-shrink:0}
.feed-sidebar-search input{width:100%;padding:4px 7px;border-radius:6px;border:1px solid #E8ECF0;font-size:11px;font-family:inherit;color:#1A1A2E;outline:none}
.feed-sidebar-search input:focus{border-color:#0960BB}
.feed-sidebar-list{flex:1}
.feed-sidebar-item{display:flex;align-items:center;padding:7px 12px;cursor:pointer;border-bottom:1px solid #F5F7FA;transition:background .12s;border-left:3px solid transparent;white-space:nowrap}
.feed-sidebar-item:hover{background:#F5F7FA}
.feed-sidebar-item.active{background:#002D720D;border-left-color:#002D72}
.feed-sidebar-item.active .fsn{color:#002D72;font-weight:700}
.fsn{font-size:11px;font-weight:500;color:#1A1A2E;overflow:hidden;text-overflow:ellipsis}
.feed-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer;transition:all .15s;flex-shrink:0}
.feed-toggle-btn:hover{border-color:#0960BB;color:#0960BB}
.feed-toggle-btn.open{border-color:#002D72;color:#002D72;background:#002D720A}
.date-quick{padding:4px 10px;border-radius:6px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer;font-family:inherit;transition:all .15s}
.date-quick:hover{border-color:#0960BB;color:#0960BB;background:#0960BB0A}
.date-quick.active{border-color:#002D72;color:#002D72;background:#002D720D}
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
      <div style="position:relative;display:inline-block"><div class="title">CommandBar Analytics<span style="margin-left:10px;font-size:11px;font-weight:300;letter-spacing:.5px;color:rgba(255,255,255,0.35);vertical-align:middle">v2.5.4</span></div><div class="subtitle" id="period-label">SouthState Correspondent</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:4px;align-items:center">
        <button class="date-quick" onclick="setQuickDate('7d')">7D</button>
        <button class="date-quick" onclick="setQuickDate('month')">Month</button>
        <button class="date-quick" onclick="setQuickDate('quarter')">Quarter</button>
        <button class="date-quick" onclick="setQuickDate('year')">Year</button>
      </div>
      <input type="date" id="date-from" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <span style="font-size:11px;color:#8A9099">to</span>
      <input type="date" id="date-to" style="padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;color:#1A1A2E">
      <button class="import-btn" id="fetch-btn" onclick="fetchAPI()" style="background:#2E7D32">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Fetch
      </button>
      <input type="file" id="csv-input" accept=".csv,.tsv,.txt" style="display:none">
      <button class="import-btn" id="csv-btn" onclick="document.getElementById('csv-input').click()" style="background:#8A9099;display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        CSV
      </button>

    </div>
  </div>
  <div id="import-msg"></div>

  <!-- Tabs -->
  <div id="tabs-bar" class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="content">Content</button>
    <button class="tab" data-tab="insights">Performance</button>
    <button class="tab" data-tab="engagement">Activity</button>
    <button class="tab" data-tab="historical">Compare</button>
    <button class="tab" data-tab="leaderboard">Trending</button>
    <button class="tab" data-tab="companies">Companies</button>
    <button class="tab" data-tab="map">Map</button>
    <button class="tab" data-tab="contacts">Contacts</button>
    <button class="tab" data-tab="art">Acq Risk Tool</button>
  </div>

  <!-- Tab Panels -->
  <div id="tab-overview"></div>
  <div id="tab-content" class="hidden"></div>
  <div id="tab-insights" class="hidden"></div>
  <div id="tab-engagement" class="hidden"></div>
  <div id="tab-historical" class="hidden"></div>
  <div id="tab-leaderboard" class="hidden"></div>
  <div id="tab-companies" class="hidden"></div>
  <div id="tab-map" class="hidden"></div>
  <div id="tab-contacts" class="hidden"></div>
  <div id="tab-art" class="hidden"></div>

  <div class="footer" id="footer">CommandBar Analytics Dashboard v2.5.4 · Powered by SiteImprove Events + Leadfeeder · SouthState Correspondent</div>
</div>

<script>
// ── DATA ──
let RAW_DATA = [];
let RAW_DATA_ALL = [];
let PERIOD = "";
let hasData = false;
let currentTab = "overview";
let contentSortField = "total";
let contentSortDir = "desc";
let contentShowAll = false;
let charts = {};

const CL = {navy:"#002D72",blue:"#0960BB",gold:"#FFBF3F",red:"#E53935",grey:"#8A9099",green:"#2E7D32"};

function trunc(s,n=40){return s.length>n?s.slice(0,n-1)+"\u2026":s}
function badge(pct){
  const cls=pct>=50?"strong":pct>0?"mixed":"weak";
  const color=pct>=50?CL.blue:pct>0?CL.gold:CL.red;
  return `<span class="badge badge-${cls}"><span class="badge-dot" style="background:${color}"></span>${cls.charAt(0).toUpperCase()+cls.slice(1)}</span>`;
}
function card(label,value,sub,accent){
  accent=accent||CL.navy;
  return `<div class="card"><div class="card-label">${label}</div><div class="card-value" style="color:${accent}">${value}</div>${sub?`<div class="card-sub">${sub}</div>`:""}</div>`;
}

// ── LEADFEEDER FEED STATE ──
var LF_URL = "https://leadfeeder-proxy.jameswspence.workers.dev";

var LF_FEEDS_STATIC = [
  {id:"adc3fd58-9efb-11ec-a2e4-35bdf72110d7", name:"ICP"},
  {id:"66d325bc-7306-11f0-9c64-5db4939f49ea", name:"Banking and Finance"},
  {id:"d92ac4f6-9f08-11ec-b201-5dbc05743d4b", name:"ARC"},
  {id:"715aff44-9f26-11ec-9d86-7515457aa63b", name:"Loan Command"},
  {id:"3409ff36-15ce-11ed-ade3-47b1039f35fa", name:"ON FIRE"},
];

var lfFeeds = LF_FEEDS_STATIC.slice();
var currentLfFeed = null;
var lfFeedsLoaded = false;

async function fetchLfFeeds(){
  if(lfFeedsLoaded)return;
  try{
    var resp = await fetch(LF_URL+"/feeds", { cache: 'no-store' });
    var result = await resp.json();
    if(result.data && result.data.length > 0){
      lfFeeds = result.data.map(function(f){
        return {id: f.id, name: f.name || f.id, lead_count: f.lead_count};
      });
    }
    lfFeedsLoaded = true;
  }catch(e){
    lfFeedsLoaded = true;
  }
  renderFeedSidebars();
}

var feedSidebarOpen = true;

function feedSidebarHTML(domId){
  var collapsed = feedSidebarOpen ? '' : ' collapsed';
  var html = '<div class="feed-sidebar'+collapsed+'" id="'+domId+'">';
  html += '<div class="feed-sidebar-header">';
  html += '<span class="feed-sidebar-label">Feeds</span>';
  html += '</div>';
  html += '<div class="feed-sidebar-search"><input type="text" placeholder="Search..." oninput="filterFeedSidebar(this.value,\''+domId+'\')" id="'+domId+'-search"></div>';
  html += '<div class="feed-sidebar-list" id="'+domId+'-list">';
  html += feedSidebarItems();
  html += '</div></div>';
  return html;
}

function feedSidebarItems(filter){
  filter = (filter||'').toLowerCase();
  var items = '';
  var allActive = (currentLfFeed === null);
  items += '<div class="feed-sidebar-item'+(allActive?' active':'')+'" onclick="setLfFeed(null)">';
  items += '<span class="fsn">All feeds</span>';
  items += '</div>';
  lfFeeds.filter(function(f){return !filter||f.name.toLowerCase().indexOf(filter)>-1}).forEach(function(f){
    var isActive = (currentLfFeed === f.id);
    items += '<div class="feed-sidebar-item'+(isActive?' active':'')+'" onclick="setLfFeed(\''+f.id+'\')">';
    items += '<span class="fsn">'+f.name+'</span>';
    items += '</div>';
  });
  return items;
}

function filterFeedSidebar(val, domId){
  var list = document.getElementById(domId+'-list');
  if(list) list.innerHTML = feedSidebarItems(val);
}

function toggleFeedSidebar(){
  feedSidebarOpen = !feedSidebarOpen;
  ['co-feed-sidebar','map-feed-sidebar'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.classList.toggle('collapsed', !feedSidebarOpen);
  });
  document.querySelectorAll('.feed-toggle-btn').forEach(function(btn){
    btn.classList.toggle('open', feedSidebarOpen);
    btn.innerHTML = feedSidebarOpen
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Feeds'
      : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg> Feeds';
  });
}

function renderFeedSidebars(){
  ['co-feed-sidebar','map-feed-sidebar'].forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    var searchEl = document.getElementById(id+'-search');
    var searchVal = searchEl ? searchEl.value : '';
    el.outerHTML = feedSidebarHTML(id);
    var newSearch = document.getElementById(id+'-search');
    if(newSearch && searchVal) newSearch.value = searchVal;
  });
}

function setLfFeed(feedId){
  currentLfFeed = feedId || null;
  companiesData = null;
  mapStateData = null;
  companyPagesCache = {};
  renderFeedSidebars();
  if(currentTab === 'companies') fetchCompanies();
  else if(currentTab === 'map') fetchMapData();
  else fetchCompanies();
}

// ── PARSE ──
function parseCSV(text){
  const lines=text.split(/\r?\n/);
  let period="",headerIdx=0;
  for(let i=0;i<Math.min(lines.length,10);i++){
    if(lines[i].includes("Period:"))period=lines[i].replace(/.*Period:\s*/,"").trim();
    if(lines[i].replace(/"/g,"").startsWith("Category")){headerIdx=i;break;}
  }
  const results=[];
  const allRows=[];
  for(const line of lines.slice(headerIdx+1).filter(l=>l.trim())){
    const p=line.split("\t").map(s=>s.replace(/^"|"$/g,"").trim());
    if(p.length<6)continue;
    const row={category:p[0],action:p[1],label:p[2],events:parseInt(p[3],10)||0,visits:parseInt(p[5],10)||0};
    allRows.push(row);
    if(p[0]==="CommandBar") results.push(row);
  }
  return{data:results,allRows:allRows,period:period||null};
}

// ── PROCESS ──
function process(R){
  const get=(a,l)=>R.filter(r=>r.action===a&&(!l||r.label===l)).reduce((s,r)=>s+r.events,0);
  const getV=(a)=>{const r=R.find(x=>x.action===a);return r?r.visits:0;};
  const dailyVisits=get("Daily Visit"),dailyVisitors=getV("Daily Visit"),railOpens=get("Open");
  const nudgeShown=get("Nudge"),nudgeDismiss=get("Nudge Dismiss");
  const clicks=R.filter(r=>r.action==="Click"),clickTotal=clicks.reduce((s,r)=>s+r.events,0);
  const saves=R.filter(r=>r.action==="Save"),saveTotal=saves.reduce((s,r)=>s+r.events,0);
  const shares=R.filter(r=>r.action==="Share"),shareTotal=shares.reduce((s,r)=>s+r.events,0);
  const actionsTotal=clickTotal+saveTotal+shareTotal;
  const myStuff=get("Click","Mystuff"),signup=get("Click","Signup");
  const discover=clicks.filter(c=>c.label.startsWith("Discover")).reduce((s,c)=>s+c.events,0);
  const recent=clicks.filter(c=>c.label.startsWith("Recent")).reduce((s,c)=>s+c.events,0);
  const savedNav=clicks.filter(c=>c.label.startsWith("Saved")).reduce((s,c)=>s+c.events,0);
  const blogNav=get("Click","Blog");
  const podcastNav=get("Click","Podcast");
  const eventsNav=get("Click","Events");
  const otherNav=Math.max(0,clickTotal-myStuff-signup-discover-recent-savedNav-blogNav-podcastNav-eventsNav);

  const actionBreakdown=[
    {name:"My Stuff",value:myStuff,color:CL.navy},{name:"Share",value:shareTotal,color:CL.green},
    {name:"Signup",value:signup,color:CL.blue},{name:"Save",value:saveTotal,color:CL.gold},
    {name:"Recent Nav",value:recent,color:"#6B7280"},{name:"Saved Nav",value:savedNav,color:"#8B5CF6"},
    {name:"Discover",value:discover,color:"#0891B2"},{name:"Blog Nav",value:blogNav,color:"#D97706"},
    {name:"Podcast Nav",value:podcastNav,color:"#7C3AED"},{name:"Events Nav",value:eventsNav,color:"#059669"},
    {name:"Other Nav",value:otherNav,color:"#9CA3AF"},
  ].filter(f=>f.value>0).sort((a,b)=>b.value-a.value);

  const actionDetail=[
    {label:"My Stuff opens",count:myStuff,color:CL.navy},
    {label:"Shares",count:shareTotal,color:CL.green,items:[...shares].sort((a,b)=>b.events-a.events).map(s=>s.label+" ("+s.events+")")},
    {label:"Signup clicks",count:signup,color:CL.blue},
    {label:"Saves",count:saveTotal,color:CL.gold,items:saves.map(s=>s.label+" ("+s.events+")")},
    {label:"Discover clicks",count:discover,color:"#0891B2"},
    {label:"Recent navigation",count:recent,color:"#6B7280"},
    {label:"Saved item clicks",count:savedNav,color:"#8B5CF6"},
    {label:"Blog nav",count:blogNav,color:"#D97706"},
    {label:"Podcast nav",count:podcastNav,color:"#7C3AED"},
    {label:"Events nav",count:eventsNav,color:"#059669"},
    {label:"Other clicks",count:otherNav,color:"#9CA3AF"},
  ].filter(f=>f.count>0);

  const content={};
  ["Blog","Page","Podcast"].forEach(ct=>{
    R.filter(r=>r.action===ct).forEach(r=>{
      if(!r.label.includes(": "))return;
      const tier=r.label.split(": ")[0],title=r.label.split(": ").slice(1).join(": ");
      const key=ct+"|"+title;
      if(!content[key])content[key]={title,type:ct,deepRead:0,skim:0,bounce:0,listener:0,deepListen:0};
      const m={"Deep Read":"deepRead","Skim":"skim","Bounce":"bounce","Listener":"listener","Deep Listen":"deepListen"};
      if(m[tier])content[key][m[tier]]=r.events;
    });
  });
  const articles=Object.values(content).map(d=>{
    const total=d.deepRead+d.skim+d.bounce+d.listener+d.deepListen;
    const engaged=d.deepRead+d.listener+d.deepListen;
    return{...d,total,engaged,engPct:total?Math.round(engaged/total*100):0};
  }).sort((a,b)=>b.total-a.total);

  const totalContent=articles.reduce((s,a)=>s+a.total,0);
  const totalEngaged=articles.reduce((s,a)=>s+a.engaged,0);
  const totalSkim=articles.reduce((s,a)=>s+a.skim,0);
  const totalBounce=articles.reduce((s,a)=>s+a.bounce,0);

  return{dailyVisits,dailyVisitors,railOpens,nudgeShown,nudgeDismiss,clickTotal,clicks,saveTotal,saves,shareTotal,shares,actionsTotal,actionBreakdown,actionDetail,articles,totalContent,totalEngaged,totalSkim,totalBounce,myStuff,signup};
}

// ── OVERVIEW RENDER ──
function renderOverview(d){

  if(top5.length){

    });

    html+='<div style="font-size:12px;color:#8A9099;padding:12px 0">No content data this period</div>';
  }
  html+='</div>';

  html+='<div class="chart-card" style="flex:1 1 180px"><div class="chart-title">Content by Type</div><div class="chart-wrap" style="height:170px"><canvas id="c-type-ov"></canvas></div></div>';

  var stateCounts={};
  if(!lfLoading&&companiesData){
    companiesData.filter(function(c){
      return !INTERNAL_NAMES.some(function(n){return(c.name||"").toLowerCase().includes(n.toLowerCase());});
    }).forEach(function(c){
      var sc=c.state||c.location_state||"";
      if(sc){stateCounts[sc]=(stateCounts[sc]||0)+1;}
    });
  }
  var topStates=Object.entries(stateCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  html+='<div class="chart-card" style="flex:1 1 240px"><div class="chart-title">Top States Visiting</div>';
  if(lfLoading){

  } else if(topStates.length){
    var maxSt=topStates[0][1];
    topStates.forEach(function(pair){
      var pct=maxSt>0?(pair[1]/maxSt*100):0;
      html+='<div class="top5-item"><div class="top5-row"><span class="top5-title">'+pair[0]+'</span><div class="top5-right"><span class="top5-count">'+pair[1]+'</span></div></div><div class="top5-bar"><div class="top5-fill" style="width:'+pct+'%;background:'+CL.navy+'"></div></div></div>';
    });
  } else {
    html+='<div style="font-size:12px;color:#8A9099;padding:12px 0">No location data this period</div>';
  }
  html+='</div>';
  html+='</div>';

  document.getElementById("tab-overview").innerHTML=html;

  var blogTotal=blogs.reduce(function(s,a){return s+a.total;},0);
  var pageTotal=d.articles.filter(function(a){return a.type==="Page";}).reduce(function(s,a){return s+a.total;},0);
  var podTotal=pods.reduce(function(s,a){return s+a.total;},0);
  var typeData=[blogTotal,pageTotal,podTotal].filter(function(v){return v>0;});
  var typeLabels=["Blog","Page","Podcast"].filter(function(_,i){return [blogTotal,pageTotal,podTotal][i]>0;});
  var typeColors=[CL.blue,"#8A9099",CL.gold].filter(function(_,i){return [blogTotal,pageTotal,podTotal][i]>0;});
  if(document.getElementById("c-type-ov")&&typeData.length){

    charts["type-ov"]=new Chart(document.getElementById("c-type-ov"),{type:"doughnut",data:{labels:typeLabels,datasets:[{data:typeData,backgroundColor:typeColors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:8}}}}});
  }
}

var companiesData=null;

function lfLeadsUrl(page, startDate, endDate){
  var base = currentLfFeed
    ? LF_URL+"/feeds/"+currentLfFeed+"/leads"
    : LF_URL+"/leads";
  return base+"?start_date="+startDate+"&end_date="+endDate+"&page="+page+"&page_size=100";
}

async function fetchCompanies(){
  var btn=document.getElementById("co-fetch-btn");
  var status=document.getElementById("co-status");
  var fromEl=document.getElementById("date-from");
  var toEl=document.getElementById("date-to");

  var startDate=fromEl&&fromEl.value?fromEl.value:defaultDateStr(-6);
  var endDate=toEl&&toEl.value?toEl.value:defaultDateStr(0);

  if(btn){btn.innerHTML="Loading...";btn.style.opacity=".6";btn.style.pointerEvents="none";}
  if(status)status.textContent="Fetching companies"+(currentLfFeed?" for feed: "+lfFeedName(currentLfFeed):"")+"...";

  try{
    var allLeads=[];
    var pg=1;
    var more=true;
    while(more&&pg<=5){
      if(status)status.textContent="Fetching page "+pg+"...";
      var resp=await fetch(lfLeadsUrl(pg, startDate, endDate), { cache: 'no-store' });
      var result=await resp.json();
      if(result.error)throw new Error(result.error);
      allLeads=allLeads.concat(result.data||[]);
      more=(result.data||[]).length>=100;
      pg++;
    }
    companiesData=allLeads;
    if(hasData){var dov=process(RAW_DATA);renderOverview(dov);}

    var feedLabel=currentLfFeed?" · "+lfFeedName(currentLfFeed):"";
    if(status)status.innerHTML='<span style="color:#2E7D32">'+allLeads.length+' companies loaded'+feedLabel+'.</span>';
    renderCompaniesTable();
    buildMapStateData();
  }catch(err){
    if(status)status.innerHTML='<span style="color:#E53935">Failed: '+err.message+'</span>';
  }

  if(btn){btn.innerHTML="Reload";btn.style.opacity="1";btn.style.pointerEvents="auto";}
}

function lfFeedName(id){
  var f=lfFeeds.find(function(f){return f.id===id;});
  return f?f.name:id;
}

function setQuickDate(range){
  var today=new Date();
  var from=new Date(today);
  if(range==='7d'){from.setDate(today.getDate()-6);}
  else if(range==='month'){from=new Date(today.getFullYear(),today.getMonth(),1);}
  else if(range==='quarter'){var q=Math.floor(today.getMonth()/3);from=new Date(today.getFullYear(),q*3,1);}
  else if(range==='year'){from=new Date(today.getFullYear(),0,1);}
  var fmt=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
  document.getElementById('date-from').value=fmt(from);
  document.getElementById('date-to').value=fmt(today);
  document.querySelectorAll('.date-quick').forEach(function(b){b.classList.remove('active');});
  var map={'7d':0,'month':1,'quarter':2,'year':3};
  var btns=document.querySelectorAll('.date-quick');
  if(btns[map[range]])btns[map[range]].classList.add('active');
}

function defaultDateStr(offset){
  var d=new Date();d.setDate(d.getDate()+offset);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

  var sortBy=(document.getElementById("co-sort")||{}).value||"quality";

  var stateSearch=((document.getElementById("co-search-state")||{}).value||"").toLowerCase().trim();

  var filtered=companiesData.filter(function(c){
    if(hideInternal&&hideInternal.checked&&INTERNAL_NAMES.some(function(n){return c.name.indexOf(n)>-1}))return false;
    if(bankingOnly&&bankingOnly.checked){
      var ind=(c.industry||"").toLowerCase();
      if(!(ind.indexOf("bank")>-1||ind.indexOf("financial")>-1||ind.indexOf("credit")>-1||ind.indexOf("investment")>-1))return false;
    }
    if(nameSearch&&(c.name||"").toLowerCase().indexOf(nameSearch)===-1)return false;
    if(stateSearch&&(c.state||"").toLowerCase().indexOf(stateSearch)===-1)return false;
    return true;

    if(sortBy==="name")return(a.name||"").localeCompare(b.name||"");

async function toggleCompanyPages(leadId,rowId){
  var row=document.getElementById(rowId);
  if(!row)return;
  if(row.style.display!=="none"){row.style.display="none";return;}
  row.style.display="";
  var contentEl=document.getElementById(rowId+"-content");
  if(!contentEl)return;
  if(companiesData){
    var lead=companiesData.find(function(c){return c.id===leadId;});
    if(lead){
      console.group("Leadfeeder lead — "+leadId);
      console.log("Full lead object (raw):", lead);
      console.log("contacts field:", lead.contacts);
      console.log("email field:", lead.email);
      console.groupEnd();
    }
  }
  if(companyPagesCache[leadId]){renderCompanyPages(contentEl,companyPagesCache[leadId]);return;}
  contentEl.innerHTML='<span style="color:#8A9099">Loading visited pages...</span>';
  try{
    var fromEl=document.getElementById("date-from");

function renderCompanyPages(el,visits){
  if(!visits||visits.length===0){el.innerHTML='<span style="color:#8A9099">No visit details available for this period.</span>';return;}
  var html='<div style="margin-bottom:4px;font-size:10px;font-weight:600;color:#002D72;text-transform:uppercase;letter-spacing:.5px">'+visits.length+' Visit'+(visits.length>1?"s":"")+'</div>';
  visits.forEach(function(v,vi){
    var route=v.visit_route||[];
    var visitHasContact=route.some(function(p){
      if(!p.page_path) return false;
      var qIdx=p.page_path.indexOf("?");
      if(qIdx===-1) return false;
      return p.page_path.slice(qIdx+1).split("&").some(function(pair){
        var kv=pair.split("=");
        return kv[0]==="utm_sfc"&&kv[1];
      });
    });
    var timeStr=v.date+(v.hour!=null?" at "+String(v.hour).padStart(2,"0")+":00":"");
    var lengthStr=v.visit_length>0?Math.floor(v.visit_length/60)+"m "+(v.visit_length%60)+"s":"< 1s";
    var srcStr=(v.source||"direct")+(v.medium?" / "+v.medium:"");
    var blockStyle="padding:8px 0 8px "+(visitHasContact?"10px":"0")+";";
    blockStyle+=vi<visits.length-1?"border-bottom:1px solid #E8ECF0;":"";
    blockStyle+=visitHasContact?"border-left:3px solid #FFBF3F;margin-left:-2px;background:linear-gradient(to right,#FFBF3F0A,transparent 60%);":"";
    html+='<div style="'+blockStyle+'">';
    html+='<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:4px">';
    html+='<span style="font-size:11px;font-weight:600;color:#1A1A2E">'+timeStr+'</span>';
    html+='<span style="font-size:10px;color:#8A9099">'+lengthStr+' · '+route.length+' page'+(route.length!==1?"s":"")+'</span>';
    html+='<span style="font-size:10px;color:#8A9099">via '+srcStr+'</span>';
    if(v.device_type)html+='<span style="font-size:10px;color:#8A9099">· '+v.device_type+'</span>';
    if(visitHasContact)html+='<span style="font-size:9px;font-weight:700;color:#B8860B;background:#FFBF3F22;border:1px solid #FFBF3F55;border-radius:4px;padding:1px 6px;letter-spacing:.4px;text-transform:uppercase">Contact Identified</span>';
    html+='</div>';
    if(route.length>0){
      html+='<div style="margin-left:8px;border-left:2px solid #E8ECF0;padding-left:10px">';
      route.forEach(function(p,pi){
        var topStr=p.time_on_page>0?Math.floor(p.time_on_page/60)+"m "+(p.time_on_page%60)+"s":"< 1s";
        var pageLabel=p.page_title||p.page_path||"";
        var utmSfc=null;
        var cleanPath=p.page_path||"";
        if(p.page_path){
          var qIdx=p.page_path.indexOf("?");
          if(qIdx>-1){
            cleanPath=p.page_path.slice(0,qIdx);
            p.page_path.slice(qIdx+1).split("&").forEach(function(pair){
              var kv=pair.split("=");
              if(kv[0]==="utm_sfc"&&kv[1]) utmSfc=decodeURIComponent(kv[1]);
            });
          }
        }
        var cleanUrl=cleanPath?("https://www.southstatecorrespondent.com"+cleanPath):"";
        var pageRowId="pr-"+vi+"-"+pi;
        html+='<div style="padding:3px 0">';
        html+='<div style="display:flex;align-items:center;gap:8px">';
        html+='<span style="width:6px;height:6px;border-radius:50%;background:'+(pi===0?"#0960BB":"#D0D5DD")+';flex-shrink:0"></span>';
        html+='<span onclick="var r=document.getElementById(\''+pageRowId+'\');r.style.display=r.style.display===\'none\'?\'block\':\'none\'" style="font-size:11px;color:#1A1A2E;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" title="Click to see URL">'+pageLabel+'</span>';
        if(utmSfc){
          var sfUrl="https://southstatecorrespondent.lightning.force.com/"+utmSfc;
          html+='<a href="'+sfUrl+'" target="_blank" rel="noopener" style="font-size:10px;color:#0960BB;font-weight:600;white-space:nowrap;text-decoration:none;flex-shrink:0;padding:1px 7px;border:1px solid #0960BB22;border-radius:4px">View Contact ↗</a>';
        }
        html+='<span style="font-size:10px;color:#8A9099;flex-shrink:0">'+topStr+'</span>';
        html+='</div>';
        if(cleanUrl){
          html+='<div id="'+pageRowId+'" style="display:none;padding:2px 0 2px 22px">';
          html+='<a href="'+cleanUrl+'" target="_blank" rel="noopener" style="font-size:10px;color:#8A9099;text-decoration:none;word-break:break-all">'+cleanUrl+'</a>';
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

var STATE_NAMES={};
Object.keys(US_STATES).forEach(function(k){STATE_NAMES[US_STATES[k].toLowerCase()]=k;STATE_NAMES[k.toLowerCase()]=k;});

function resolveStateCode(c){
  if(!c.state&&!c.state_code)return"";
  if(c.state_code&&c.state_code.length===2)return c.state_code.toUpperCase();
  var s=(c.state||"").toLowerCase().trim();
  if(STATE_NAMES[s])return STATE_NAMES[s];
  var keys=Object.keys(US_STATES);
  for(var i=0;i<keys.length;i++){if(US_STATES[keys[i]].toLowerCase().indexOf(s)>-1)return keys[i];}
  return"";
}

async function fetchMapData(){
  var status=document.getElementById("map-status");
  if(companiesData){buildMapStateData();return;}
  if(status)status.textContent="Loading companies for map...";
  await fetchCompanies();
  buildMapStateData();
}

function buildMapStateData(){
  var status=document.getElementById("map-status");
  if(!companiesData){if(status)status.innerHTML='<span style="color:#E53935">No company data loaded.</span>';return;}
  mapStateData={};
  var unmapped=0;
  var bankingCheckbox=document.getElementById("co-filter-banking");
  var bankingOnly=bankingCheckbox&&bankingCheckbox.checked;
  companiesData.forEach(function(c){
    var ind=(c.industry||"").toLowerCase();
    if(bankingOnly&&!(ind.indexOf("bank")>-1||ind.indexOf("financial")>-1||ind.indexOf("credit")>-1||ind.indexOf("investment")>-1))return;
    if(INTERNAL_NAMES.some(function(n){return c.name.indexOf(n)>-1}))return;
    var sc=resolveStateCode(c);
    if(!sc||!US_STATES[sc]){unmapped++;return;}
    if(!mapStateData[sc])mapStateData[sc]={code:sc,name:US_STATES[sc],companies:[],cities:{}};
    mapStateData[sc].companies.push(c);
    var city=c.city||"Unknown";
    if(!mapStateData[sc].cities[city])mapStateData[sc].cities[city]=[];
    mapStateData[sc].cities[city].push(c);
  });
  var stateCount=Object.keys(mapStateData).length;
  var totalCos=Object.keys(mapStateData).reduce(function(s,k){return s+mapStateData[k].companies.length},0);
  var feedLabel=currentLfFeed?" · "+lfFeedName(currentLfFeed):"";
  if(status)status.innerHTML='<span style="color:#2E7D32">'+totalCos+' banking companies across '+stateCount+' states'+feedLabel+'.'+(unmapped>0?' ('+unmapped+' without location data)':'')+'</span>';
  mapCurrentView="us";
  renderUSMap();
}

function renderUSMap(){
  var container=document.getElementById("map-container");

  var breadcrumb=document.getElementById("map-breadcrumb");

  if(backBtn)backBtn.style.display=mapCurrentView==="us"?"none":"";

    if(breadcrumb)breadcrumb.innerHTML='<span class="chart-title" style="margin-bottom:0">Bank Visitor Map \u2014 United States</span>';
    renderStateList(container);
  }else if(mapCurrentView==="state"){

}

var histData=null;

var extraTrafficLines=[];

function addTrafficContentLine(key){
  if(extraTrafficLines.indexOf(key)>-1)return;
  if(extraTrafficLines.length>=3){extraTrafficLines.shift();}
  extraTrafficLines.push(key);
  renderContentTags();
  if(histData)renderHistoricalCharts();
}

function removeTrafficContentLine(key){
  extraTrafficLines=extraTrafficLines.filter(function(k){return k!==key});
  renderContentTags();
  if(histData)renderHistoricalCharts();
}

function renderContentTags(){
  var el=document.getElementById("hist-content-tags");
  if(!el)return;
  if(extraTrafficLines.length===0){el.innerHTML="";return;}
  var tc=["#D97706","#0891B2","#8B5CF6"];
  var html="";
  extraTrafficLines.forEach(function(key,i){
    var short=key.length>40?key.slice(0,39)+"\u2026":key;
    var color=tc[i%tc.length];
    html+='<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;background:'+color+'14;color:'+color+';border:1px solid '+color+'30">';
    html+=short;
    html+='<span onclick="removeTrafficContentLine(\''+key.replace(/'/g,"\\'")+'\')" style="cursor:pointer;font-size:13px;line-height:1;opacity:.6">\u00d7</span>';
    html+='</span>';
  });
  el.innerHTML=html;
}

async function fetchHistorical(){
  var fromEl=document.getElementById("date-from");
  var toEl=document.getElementById("date-to");
  var btn=document.getElementById("hist-fetch-btn");
  var status=document.getElementById("hist-status");
  if(!fromEl.value||!toEl.value){status.innerHTML='<span style="color:#E53935">Select date range in the header first.</span>';return;}
  var from=new Date(fromEl.value+"T12:00:00");
  var to=new Date(toEl.value+"T12:00:00");
  if(from>to){status.innerHTML='<span style="color:#E53935">Invalid date range.</span>';return;}
  function fmtD(dt){var y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,"0"),d=String(dt.getDate()).padStart(2,"0");return y+"-"+m+"-"+d;}
  var days=[];var d=new Date(from);while(d<=to){days.push(fmtD(d));d.setDate(d.getDate()+1);}
  if(days.length>60){status.innerHTML='<span style="color:#E53935">Max 60 days for daily data. Narrow the date range.</span>';return;}
  var origText=btn.innerHTML;
  btn.innerHTML="Loading...";btn.style.opacity=".6";btn.style.pointerEvents="none";
  status.textContent="Fetching "+days.length+" days...";

  async function fetchDays(dayList,statusPrefix){
    var result=[];
    for(var i=0;i<dayList.length;i++){
      var dateStr=dayList[i].replace(/-/g,"");
      status.textContent=statusPrefix+" day "+(i+1)+" of "+dayList.length+"...";
      var resp=await fetch(WORKER_URL+"?period="+dateStr+"&page_size=1000", { cache: 'no-store' });
      var data=await resp.json();
      var dayEvents=data.data||[];
      var dayObj={date:dayList[i],_titles:{}};
      dayEvents.forEach(function(e){
        if(!dayObj[e.action])dayObj[e.action]=0;
        dayObj[e.action]+=e.events;
        if(["Blog","Page","Podcast"].indexOf(e.action)>-1&&e.label.indexOf(": ")>-1){
          var title=e.label.split(": ").slice(1).join(": ");
          var key=e.action+": "+title;
          if(!dayObj._titles[key])dayObj._titles[key]=0;
          dayObj._titles[key]+=e.events;
        }
        if(e.action==="Click"){
          var clk="click_other";
          if(e.label==="Mystuff")clk="click_mystuff";
          else if(e.label==="Signup")clk="click_signup";
          else if(e.label==="Blog")clk="click_blog";
          else if(e.label==="Podcast")clk="click_podcast";
          else if(e.label==="Events")clk="click_events";
          else if(e.label.indexOf("Discover")===0)clk="click_discover";
          else if(e.label.indexOf("Recent")===0)clk="click_recent";
          else if(e.label.indexOf("Saved")===0)clk="click_saved";
          if(!dayObj[clk])dayObj[clk]=0;
          dayObj[clk]+=e.events;
        }
        if(e.action==="Share"){var sk="share_"+e.label;if(!dayObj[sk])dayObj[sk]=0;dayObj[sk]+=e.events;}
        if(e.action==="Save"){var svk="save_"+e.label;if(!dayObj[svk])dayObj[svk]=0;dayObj[svk]+=e.events;}
      });
      result.push(dayObj);
    }
    return result;
  }

  try{
    var dailyData=await fetchDays(days,"Current period:");
    histData=dailyData;
    var periodLen=days.length;
    var prevEnd=new Date(from);prevEnd.setDate(prevEnd.getDate()-1);
    var prevStart=new Date(prevEnd);prevStart.setDate(prevStart.getDate()-periodLen+1);
    var prevDays=[];var pd=new Date(prevStart);while(pd<=prevEnd){prevDays.push(fmtD(pd));pd.setDate(pd.getDate()+1);}
    status.textContent="Fetching prior period for comparison...";
    histPrevData=await fetchDays(prevDays,"Prior period:");
    var titleTotals={};
    histData.forEach(function(d){Object.keys(d._titles).forEach(function(k){if(!titleTotals[k])titleTotals[k]=0;titleTotals[k]+=d._titles[k];});});
    histTopContent=Object.keys(titleTotals).sort(function(a,b){return titleTotals[b]-titleTotals[a]}).slice(0,10);
    status.innerHTML='<span style="color:#2E7D32">'+days.length+' days loaded (+ '+prevDays.length+' day prior period).</span>';
    rebuildHistSelectors();
    renderHistoricalCharts();
    renderLeaderboard();
  }catch(err){
    status.innerHTML='<span style="color:#E53935">Fetch failed: '+err.message+'</span>';
  }
  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

var contactsIndex = {};

function buildContactsIndex(){
  contactsIndex = {};
  var source = (RAW_DATA_ALL && RAW_DATA_ALL.length) ? RAW_DATA_ALL : RAW_DATA;
  if(!source || !source.length) return;

  var sfcRows = source.filter(function(r){return r.label && r.label.indexOf('sfc:') > -1;});
  var cats = {};
  source.forEach(function(r){cats[r.category||r.action||'?']=(cats[r.category||r.action||'?']||0)+1;});
  console.group('buildContactsIndex — sfc rows: ' + sfcRows.length + ' / total: ' + source.length);
  console.log('Categories in source:', JSON.stringify(cats));
  sfcRows.slice(0,5).forEach(function(r){ console.log(JSON.stringify(r)); });
  console.groupEnd();

  source.forEach(function(row){
    if(!row.label) return;
    var sfcMatch = row.label.match(/sfc:([A-Za-z0-9]{18}|[A-Za-z0-9]{15})(?![A-Za-z0-9])/);
    if(!sfcMatch) return;
    var sfId = sfcMatch[1];
    var labelClean = row.label.replace(/\s*\|\s*sfc:[A-Za-z0-9]+/, "").trim();
    var actionType = row.action || "";
    var category = row.category || "CommandBar";
    if(!contactsIndex[sfId]){
      contactsIndex[sfId] = {sfId:sfId, pages:{}, totalEvents:0};
    }
    var c = contactsIndex[sfId];
    c.totalEvents += (row.events || 0);
    var pageKey = labelClean;
    if(!c.pages[pageKey]){
      c.pages[pageKey] = {label:labelClean, category:category, actions:{}, events:0};
    }
    c.pages[pageKey].events += (row.events || 0);
    c.pages[pageKey].actions[actionType] = (c.pages[pageKey].actions[actionType]||0) + (row.events||0);
  });
}

var CONTENT_TIERS = ['Deep Read','Deep Listen','Skim','Bounce','Listener'];
var contactTierFilter = []; // empty = all tiers shown
var contactPageSearch = '';

function parsePage(p){
  // Returns {tier, cleanTitle} or null if should be hidden
  var tierMatch = p.label.match(/^(Deep Read|Deep Listen|Skim|Bounce|Listener|Impression|Daily Visit|Open):\s*/i);
  var tier = tierMatch ? tierMatch[1] : (Object.keys(p.actions)[0] || '');
  // Hide pip activity rows
  if(/^(Impression|Daily Visit|Open)$/i.test(tier)) return null;
  var cleanTitle = tierMatch ? p.label.slice(tierMatch[0].length) : p.label;
  cleanTitle = cleanTitle.replace(/\s*\|\s*sfc:[A-Za-z0-9]+$/, '').trim();
  // Hide bare "Pip" entries
  if(/^pip$/i.test(cleanTitle)) return null;
  return {tier: tier, cleanTitle: cleanTitle};
}

function getFilteredPages(c){
  return Object.values(c.pages).map(function(p){
    var parsed = parsePage(p);
    if(!parsed) return null;
    if(contactTierFilter.length && contactTierFilter.indexOf(parsed.tier) === -1) return null;
    if(contactPageSearch && parsed.cleanTitle.toLowerCase().indexOf(contactPageSearch) === -1) return null;
    return parsed;
  }).filter(Boolean);
}

function toggleContactTier(tier){
  if(contactTierFilter.length === 0){
    // Was "all" — select only this one
    contactTierFilter = CONTENT_TIERS.filter(function(t){ return t !== tier; });
  } else {
    var idx = contactTierFilter.indexOf(tier);
    if(idx > -1) contactTierFilter.splice(idx, 1);
    else contactTierFilter.push(tier);
    // If all selected, reset to "all"
    if(contactTierFilter.length === CONTENT_TIERS.length) contactTierFilter = [];
  }
  renderContactsTab();
}

function toggleContactPages(rowId){
  var row = document.getElementById(rowId);

function clearContactTiers(){
  contactTierFilter = [];
  renderContactsTab();
}

function setContactPageSearch(val){

  if(list) list.innerHTML = renderContactRows();
}

var artData = null;
var ART_CATEGORY = "Acquisition Risk Tool";

async function fetchART() {
  var btn = document.getElementById("art-fetch-btn");
  var status = document.getElementById("art-status");
  var fromEl = document.getElementById("date-from");
  var toEl = document.getElementById("date-to");
  var startDate = fromEl && fromEl.value ? fromEl.value.replace(/-/g,"") : defaultDateStr(-6).replace(/-/g,"");
  var endDate = toEl && toEl.value ? toEl.value.replace(/-/g,"") : defaultDateStr(0).replace(/-/g,"");

  if (btn) { btn.innerHTML = "Loading..."; btn.style.opacity = ".6"; btn.style.pointerEvents = "none"; }
  if (status) status.textContent = "Fetching Acquisition Risk Tool events...";

  try {
    var url = WORKER_URL + "?period=" + startDate + "_" + endDate
      + "&category=" + encodeURIComponent(ART_CATEGORY)
      + "&page_size=1000";
    var resp = await fetch(url, { cache: 'no-store' });
    var result = await resp.json();
    if (result.error) throw new Error(result.error + (result.detail ? " — " + result.detail : ""));
    artData = result.data || [];
    if (status) status.innerHTML = '<span style="color:#2E7D32">' + artData.length + ' rows loaded for "' + ART_CATEGORY + '".</span>';
    renderARTContent();
  } catch (err) {
    if (status) status.innerHTML = '<span style="color:#E53935">Failed: ' + err.message + '</span>';
  }
  if (btn) { btn.innerHTML = "Reload"; btn.style.opacity = "1"; btn.style.pointerEvents = "auto"; }
}

// ── ART label parser ──
// Format: "BANK NAME (CERT #XXXXX), ST | Score: NN | Risk Label"
function parseARTLabel(lbl) {
  var certMatch = lbl.match(/^(.*?)\s*\(CERT\s*#(\d+)\),\s*([A-Z]{2})\s*\|\s*Score:\s*(\d+)\s*\|\s*(.+)$/i);
  if (certMatch) {
    return {
      bankName: certMatch[1].trim(),
      cert: certMatch[2],
      state: certMatch[3].toUpperCase(),
      score: parseInt(certMatch[4], 10),
      risk: certMatch[5].trim(),
      raw: lbl
    };
  }
  // Fallback — try partial matches
  var stateMatch = lbl.match(/,\s*([A-Z]{2})/);
  var scoreMatch = lbl.match(/Score:\s*(\d+)/i);
  var riskMatch = lbl.match(/\|\s*([^|]+)$/);
  return {
    bankName: lbl.split('(')[0].trim(),
    cert: null,
    state: stateMatch ? stateMatch[1] : null,
    score: scoreMatch ? parseInt(scoreMatch[1], 10) : null,
    risk: riskMatch ? riskMatch[1].trim() : null,
    raw: lbl
  };
}

// ART filter state
var artSearch = '';
var artStateFilter = '';
var artScoreMin = 0;
var artScoreMax = 100;
var artSortField = 'score';
var artSortDir = 'desc';

function renderARTContent() {
  var el = document.getElementById("art-content");
  if (!el || !artData) return;

  if (artData.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:#8A9099;font-size:13px">No "' + ART_CATEGORY + '" events found for this date range.</div>';
    return;
  }

  // ── Parse and dedupe by bank identity (name+cert), not raw label ──
  var byLabel = {};
  artData.forEach(function(r) {
    var lbl = r.label || '';
    var parsed = parseARTLabel(lbl);
    // Use cert as dedup key if available, otherwise bank name
    var key = parsed.cert ? parsed.cert : parsed.bankName.toLowerCase();
    if (!byLabel[key]) {
      byLabel[key] = Object.assign(parsed, { events: 0, actions: {} });
    }
    byLabel[key].events += (r.events || 0);
    var a = r.action || '(none)';
    byLabel[key].actions[a] = (byLabel[key].actions[a] || 0) + (r.events || 0);
  });

  var allRows = Object.values(byLabel);

  // ── Gather states for dropdown ──
  var stateSet = {};
  allRows.forEach(function(r) { if (r.state) stateSet[r.state] = true; });
  var allStates = Object.keys(stateSet).sort();

  // ── Score range for parsed rows ──
  var scoredRows = allRows.filter(function(r) { return r.score !== null; });
  var globalMin = scoredRows.length ? Math.min.apply(null, scoredRows.map(function(r){return r.score;})) : 0;
  var globalMax = scoredRows.length ? Math.max.apply(null, scoredRows.map(function(r){return r.score;})) : 100;

  // ── Risk label colors ──
  function riskColor(risk) {
    if (!risk) return '#8A9099';
    var r = risk.toLowerCase();
    if (r.indexOf('high') > -1) return CL.red;
    if (r.indexOf('moderate') > -1) return CL.gold;
    if (r.indexOf('low') > -1) return CL.green;
    return '#8A9099';
  }

  // ── Score bar color ──
  function scoreColor(score) {
    if (score === null) return '#8A9099';
    if (score >= 70) return CL.red;
    if (score >= 40) return CL.gold;
    return CL.green;
  }

  // ── Summary cards ──
  var totalEvents = allRows.reduce(function(s,r){return s+r.events;},0);
  var html = '<div class="cards">';
  html += card("Banks Tracked", allRows.length.toLocaleString(), "Unique institutions this period");
  html += card("Total Events", totalEvents.toLocaleString(), "Across all actions", CL.blue);
  html += card("States", allStates.length, "States represented", CL.gold);
  var highRisk = allRows.filter(function(r){return r.score !== null && r.score >= 70;}).length;
  if (highRisk > 0) html += card("High Risk", highRisk, "Score 70+", CL.red);
  html += '</div>';

  // ── Filters row ──
  html += '<div class="chart-card" style="margin-bottom:16px;padding:12px 16px">';
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">';

  // Search
  html += '<div style="flex:1;min-width:180px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Search Bank</div>';
  html += '<input type="text" id="art-search" placeholder="Bank name..." value="' + artSearch + '" oninput="artSetSearch(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div>';

  // State dropdown
  html += '<div style="min-width:100px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">State</div>';
  html += '<select id="art-state" onchange="artSetState(this.value)" style="width:100%;padding:6px 8px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none">';
  html += '<option value="">All</option>';
  allStates.forEach(function(st) {
    html += '<option value="' + st + '"' + (artStateFilter === st ? ' selected' : '') + '>' + st + '</option>';
  });
  html += '</select></div>';

  // Score min/max
  html += '<div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Min</div>';
  html += '<input type="number" id="art-score-min" min="0" max="100" value="' + artScoreMin + '" oninput="artSetScoreMin(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div>';

  html += '<div style="min-width:120px"><div style="font-size:10px;font-weight:700;color:#8A9099;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Score Max</div>';
  html += '<input type="number" id="art-score-max" min="0" max="100" value="' + artScoreMax + '" oninput="artSetScoreMax(this.value)" style="width:100%;padding:6px 10px;border-radius:8px;border:1px solid #E8ECF0;font-size:12px;font-family:inherit;outline:none"></div>';

  // Reset
  html += '<div><button onclick="artResetFilters()" style="padding:6px 14px;border-radius:8px;border:1px solid #E8ECF0;background:#fff;font-size:11px;font-weight:600;color:#8A9099;cursor:pointer">Reset</button></div>';
  html += '</div></div>';

  // ── Apply filters ──
  html += '<div id="art-list">' + renderARTList(allRows, riskColor, scoreColor) + '</div>';

  // ── Debug panel ──
  html += '<details style="margin-bottom:16px;margin-top:8px">';
  html += '<summary style="font-size:11px;color:#8A9099;cursor:pointer;padding:8px 0">▶ Raw event schema (first 5 rows)</summary>';
  html += '<div style="margin-top:8px;padding:12px;border-radius:8px;background:#F5F7FA;font-family:monospace;font-size:11px;color:#4C4C4C;overflow-x:auto;white-space:pre">';
  html += JSON.stringify(artData.slice(0, 5), null, 2).replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html += '</div></details>';

  el.innerHTML = html;
}

function renderARTList(allRows, riskColor, scoreColor) {
  // Re-derive color fns if called standalone
  if (!riskColor) riskColor = function(risk) {
    if (!risk) return '#8A9099';
    var r = risk.toLowerCase();
    if (r.indexOf('high') > -1) return CL.red;
    if (r.indexOf('moderate') > -1) return CL.gold;
    if (r.indexOf('low') > -1) return CL.green;
    return '#8A9099';
  };
  if (!scoreColor) scoreColor = function(score) {
    if (score === null) return '#8A9099';
    if (score >= 70) return CL.red;
    if (score >= 40) return CL.gold;
    return CL.green;
  };

  // Filter
  var filtered = allRows.filter(function(r) {
    if (artSearch && r.bankName.toLowerCase().indexOf(artSearch.toLowerCase()) === -1) return false;
    if (artStateFilter && r.state !== artStateFilter) return false;
    if (r.score !== null) {
      if (r.score < artScoreMin || r.score > artScoreMax) return false;
    }
    return true;
  });

  // Sort
  filtered.sort(function(a, b) {
    if (artSortField === 'bankName') return artSortDir === 'asc' ? a.bankName.localeCompare(b.bankName) : b.bankName.localeCompare(a.bankName);
    if (artSortField === 'state') return artSortDir === 'asc' ? (a.state||'').localeCompare(b.state||'') : (b.state||'').localeCompare(a.state||'');
    if (artSortField === 'score') return artSortDir === 'asc' ? (a.score||0) - (b.score||0) : (b.score||0) - (a.score||0);
    if (artSortField === 'events') return artSortDir === 'asc' ? a.events - b.events : b.events - a.events;
    return 0;
  });

  if (filtered.length === 0) {
    return '<div style="text-align:center;padding:32px;color:#8A9099;font-size:12px">No banks match the current filters.</div>';
  }

  var maxScore = 100;
  var html = '<div style="font-size:11px;color:#8A9099;margin-bottom:8px">' + filtered.length + ' bank' + (filtered.length !== 1 ? 's' : '') + ' shown</div>';
  html += '<div class="chart-card" style="padding:0;overflow:hidden">';
  html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<thead><tr style="border-bottom:2px solid #E8ECF0">';

  var cols = [
    {l:'Bank', f:'bankName', a:'left'},
    {l:'State', f:'state', a:'center'},
    {l:'Score', f:'score', a:'center'},
    {l:'Risk', f:'risk', a:'center'},
    {l:'Views', f:'events', a:'center'}
  ];
  cols.forEach(function(col) {
    var active = artSortField === col.f;
    var arrow = active ? (artSortDir === 'desc' ? ' ▼' : ' ▲') : '';
    html += '<th onclick="artSort(\'' + col.f + '\')" style="text-align:' + col.a + ';padding:10px 12px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:' + (active ? '#002D72' : '#8A9099') + '">' + col.l + arrow + '</th>';
  });
  html += '</tr></thead><tbody>';

  filtered.forEach(function(row, i) {
    var sc = scoreColor(row.score);
    var rc = riskColor(row.risk);
    html += '<tr style="border-bottom:1px solid #F0F2F5;' + (i%2===1?'background:#FAFBFC;':'') + '">';

    // Bank name + cert
    html += '<td style="padding:9px 12px">';
    html += '<div style="font-weight:600;color:#1A1A2E">' + row.bankName + '</div>';
    if (row.cert) html += '<div style="font-size:10px;color:#8A9099">CERT #' + row.cert + '</div>';
    html += '</td>';

    // State
    html += '<td style="text-align:center;padding:9px 12px"><span style="font-size:12px;font-weight:700;color:#002D72">' + (row.state || '–') + '</span></td>';

    // Score with mini bar
    html += '<td style="text-align:center;padding:9px 12px">';
    if (row.score !== null) {
      html += '<div style="display:flex;align-items:center;gap:6px;justify-content:center">';
      html += '<div style="width:48px;height:5px;background:#F0F2F5;border-radius:3px;overflow:hidden"><div style="height:100%;width:' + row.score + '%;background:' + sc + ';border-radius:3px"></div></div>';
      html += '<span style="font-size:13px;font-weight:700;color:' + sc + '">' + row.score + '</span>';
      html += '</div>';
    } else {
      html += '<span style="color:#D0D5DD">–</span>';
    }
    html += '</td>';

    // Risk label
    html += '<td style="text-align:center;padding:9px 12px">';
    if (row.risk) {
      html += '<span style="font-size:10px;font-weight:600;color:' + rc + ';background:' + rc + '14;border-radius:6px;padding:2px 8px">' + row.risk + '</span>';
    } else {
      html += '<span style="color:#D0D5DD">–</span>';
    }
    html += '</td>';

    // Views
    html += '<td style="text-align:center;padding:9px 12px;font-weight:700;color:#002D72">' + row.events + '</td>';

    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function artSort(field) {
  if (artSortField === field) artSortDir = artSortDir === 'desc' ? 'asc' : 'desc';
  else { artSortField = field; artSortDir = field === 'bankName' || field === 'state' ? 'asc' : 'desc'; }
  var list = document.getElementById('art-list');
  if (list) {
    var byLabel = {};
    artData.forEach(function(r) {
      var lbl = r.label || '';
      var parsed = parseARTLabel(lbl);
      var key = parsed.cert ? parsed.cert : parsed.bankName.toLowerCase();
      if (!byLabel[key]) byLabel[key] = Object.assign(parsed, {events:0, actions:{}});
      byLabel[key].events += (r.events||0);
    });
    list.innerHTML = renderARTList(Object.values(byLabel));
  }
}

function artSetSearch(val) { artSearch = val; artRefreshList(); }
function artSetState(val) { artStateFilter = val; artRefreshList(); }
function artSetScoreMin(val) { artScoreMin = parseInt(val,10)||0; artRefreshList(); }
function artSetScoreMax(val) { artScoreMax = parseInt(val,10)||100; artRefreshList(); }
function artResetFilters() { artSearch=''; artStateFilter=''; artScoreMin=0; artScoreMax=100; renderARTContent(); }

function artRefreshList() {
  var list = document.getElementById('art-list');
  if (!list || !artData) return;
  var byLabel = {};
  artData.forEach(function(r) {
    var lbl = r.label || '';
    var parsed = parseARTLabel(lbl);
    var key = parsed.cert ? parsed.cert : parsed.bankName.toLowerCase();
    if (!byLabel[key]) byLabel[key] = Object.assign(parsed, {events:0, actions:{}});
    byLabel[key].events += (r.events||0);
  });
  list.innerHTML = renderARTList(Object.values(byLabel));
}

// ── EXPORT PDF ──
async function exportPDF(){
  const btn=document.getElementById("export-btn");const origText=btn.innerHTML;
  btn.innerHTML="Generating...";btn.style.opacity=".6";btn.style.pointerEvents="none";
  try{
    const {jsPDF}=window.jspdf;const pdf=new jsPDF("l","mm","a4");const pw=pdf.internal.pageSize.getWidth();const ph=pdf.internal.pageSize.getHeight();const margin=12;const contentW=pw-margin*2;const headerH=27;const footerH=8;const availH=ph-headerH-footerH;let pageCount=0;
    function drawHeader(title,contd){pdf.setFillColor(0,45,114);pdf.rect(0,0,pw,18,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(14);pdf.setTextColor(255,255,255);pdf.text("CommandBar Analytics v2.6.0",margin,12);pdf.setFont("helvetica","normal");pdf.setFontSize(9);pdf.text((PERIOD?PERIOD+" · ":"")+"SouthState Correspondent",pw-margin,12,{align:"right"});pdf.setFillColor(9,96,187);pdf.rect(0,18,pw,6,"F");pdf.setFont("helvetica","bold");pdf.setFontSize(8);pdf.setTextColor(255,255,255);pdf.text(title.toUpperCase()+(contd?" (CONTINUED)":""),margin,22.5);pdf.setTextColor(0,0,0);}
    function drawFooter(n){pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(138,144,153);pdf.text("CommandBar Analytics Dashboard v2.6.0 · SiteImprove Events",margin,ph-5);pdf.text("Page "+n,pw-margin,ph-5,{align:"right"});}
    function addPage(title,contd){if(pageCount>0)pdf.addPage();pageCount++;drawHeader(title,contd||false);drawFooter(pageCount);}
    async function captureAndAdd(el,tabName){const canvas=await html2canvas(el,{scale:2,backgroundColor:"#F5F7FA",useCORS:true,logging:false,windowWidth:980});const imgData=canvas.toDataURL("image/jpeg",0.92);const imgW=contentW;const imgH=(canvas.height/canvas.width)*contentW;const finalH=Math.min(imgH,availH);const finalW=imgH>availH?(availH/imgH)*imgW:imgW;const xOff=margin+(contentW-finalW)/2;addPage(tabName);pdf.addImage(imgData,"JPEG",xOff,headerH,finalW,finalH);}
    const tabs=["overview","content","insights","engagement","historical","leaderboard","companies","map"];
    const tabNames=["Overview","Content","Performance","Activity","Compare","Trending","Companies","Map"];
    const savedTab=currentTab;
    for(let i=0;i<tabs.length;i++){
      tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display=t===tabs[i]?"block":"none";el.classList.remove("hidden");});
      await new Promise(r=>setTimeout(r,600));
      if(tabs[i]==="content"){await captureAndAdd(document.getElementById("content-charts"),"Content");}
      else{await captureAndAdd(document.getElementById("tab-"+tabs[i]),tabNames[i]);}
    }
    tabs.forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==savedTab);});
    pdf.save("CommandBar-Analytics"+(PERIOD?"-"+PERIOD.replace(/[^a-zA-Z0-9]+/g,"-"):"")+".pdf");
  }catch(err){
    console.error("PDF export error:",err);
    document.getElementById("import-msg").innerHTML='<div class="import-msg error"><span>PDF export failed: '+err.message+'</span><span class="close" onclick="this.parentElement.remove()">\u00d7</span></div>';
    ["overview","content","insights","engagement","historical","leaderboard","companies","map","contacts","art"].forEach(t=>{const el=document.getElementById("tab-"+t);el.style.display="";el.classList.toggle("hidden",t!==currentTab);});
  }
  btn.innerHTML=origText;btn.style.opacity="1";btn.style.pointerEvents="auto";
}

if(new URLSearchParams(window.location.search).has("csv")){var csvBtn=document.getElementById("csv-input");if(csvBtn)csvBtn.style.display="";}
render();
</script>
